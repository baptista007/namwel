quote_additional_placeholder = "Conte-nos mais sobre a viagem dos seus sonhos, quaisquer locais específicos que queira visitar, requisitos alimentares ou perguntas que tenha..."
quote_faq1_q = "Quanto tempo demora para receber uma cotação?"
quote_faq1_a = "Esforçamo-nos para fornecer todas as cotações em até 24 horas. Durante épocas de maior procura, pode demorar até 48 horas. Para itinerários multi-destino complexos, poderemos precisar de um pouco mais de tempo para garantir as melhores opções."
quote_faq2_q = "O que está incluído na cotação?"
quote_faq2_a = "Cada cotação inclui um itinerário detalhado dia a dia, opções de alojamento com fotografias, todas as actividades e transfers, refeições conforme especificado, serviços de guia especializado e preço total com discriminação. Orgulhamo-nos de preços transparentes sem taxas ocultas."
quote_faq3_q = "Posso modificar a minha cotação depois de recebê-la?"
quote_faq3_a = "Com certeza! Entendemos que os planos podem mudar. Pode solicitar alterações ao seu itinerário, opções de alojamento ou datas de viagem a qualquer momento. Trabalharemos consigo para encontrar a opção perfeita."
quote_faq4_q = "Qual é a melhor época para visitar a Namíbia?"
quote_faq4_a = "A Namíbia é um destino para todo o ano. A melhor época para observar vida selvagem é de Maio a Outubro, quando os animais se concentram junto aos charcos. Para as famosas dunas de Sossusvlei, qualquer época oferece vistas espectaculares. A nossa equipa pode aconselhar sobre o melhor período com base nos seus interesses específicos."
