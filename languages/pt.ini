; ── Pacotes: Campismo & Overland ─────────────────────────────────────────
pkgs_camping_page_title = "Campismo & Overland"
pkgs_camping_page_subtitle = "Para viajantes que adoram a estrada aberta — rotas de campismo 4x4, parques nacionais e circuitos multi-país."
pkgs_camping_section_title = "O Que Esperar de um Safari de Campismo"
pkgs_camping_intro_1 = "Para amantes da natureza e de espaços amplos, o safari de campismo é a opção ideal para se aproximar das maravilhas naturais da Namíbia. A palavra safari significa <strong>\"jornada\"</strong> — e com a Namwel, o safari traz de volta uma ligação pessoal com a Natureza. Os safaris de campismo oferecem uma experiência intimista: transporte privado, jantares à luz de velas sob as estrelas, piqueniques em paisagens remotas e surpresas a cada momento."
pkgs_camping_intro_2 = "Escolha entre tours guiados ou circuitos de campismo self-drive. Podemos organizar noites em lodges de quatro e cinco estrelas juntamente com parques de campismo, oferecendo o melhor dos dois mundos — aventura de dia, conforto à noite."
pkgs_camping_feat1_title = "4x4 & Self-Drive"
pkgs_camping_feat1_sub = "Guiado ou independente"
pkgs_camping_feat2_title = "Acampamentos sob as estrelas"
pkgs_camping_feat2_sub = "Zero poluição luminosa"
pkgs_camping_feat3_title = "Aluguer de equipamento"
pkgs_camping_feat3_sub = "Kit completo disponível"
pkgs_camping_feat4_title = "Jantares no bush"
pkgs_camping_feat4_sub = "À luz de velas & privados"
pkgs_camping_destinations_title = "Destinos de Campismo Seleccionados"
pkgs_camping_destinations_desc = "Locais cuidadosamente escolhidos que oferecem paisagens de cortar a respiração, encontros únicos com a vida selvagem e aventuras ao ar livre excepcionais."
pkgs_camping_place1_title = "Namutoni Rest Camp"
pkgs_camping_place1_desc = "Um refúgio encantador dentro do Parque Nacional Etosha, construído em torno de um histórico forte alemão. Oferece alojamento confortável, restaurante e um charco onde os visitantes podem observar animais de perto."
pkgs_camping_place2_title = "Halali Rest Camp"
pkgs_camping_place2_desc = "Um refúgio tranquilo no coração de Etosha, oferecendo um ambiente sereno e excelente observação de vida selvagem. A sua localização estratégica torna-o uma base ideal para explorar as paisagens e fauna variadas de Etosha."
pkgs_camping_place3_title = "Sossusvlei & Deadvlei"
pkgs_camping_place3_desc = "Maravilhe-se com as dunas mais altas do mundo e a surreal planície de argila branca de Deadvlei ao nascer do sol. Acampar no Namib-Naukluft é uma experiência inesquecível — silêncio, estrelas e areia vermelha ancestral."
pkgs_camping_place4_title = "Wolwedans Boulders"
pkgs_camping_place4_desc = "Um safari selvagem de 7 dias no coração da Reserva Natural NamibRand — uma das paisagens desérticas mais protegidas da Namíbia. Intimista, imersivo e extraordinário."
pkgs_camping_place5_title = "Delta do Okavango & Chobe"
pkgs_camping_place5_desc = "Atravesse para o Botswana para observação de vida selvagem de classe mundial. Acampar ao longo do Rio Chobe e no interior do Delta do Okavango oferece alguns dos encontros com vida selvagem mais dramáticos do continente."
pkgs_camping_place6_title = "Costa dos Esqueletos & Damaraland"
pkgs_camping_place6_desc = "Remoto, dramático e absolutamente selvagem. A Costa dos Esqueletos e Damaraland oferecem elefantes adaptados ao deserto, antigas gravuras rupestres em Twyfelfontein e uma costa como nenhuma outra na Terra."
pkgs_camping_itineraries_title = "Itinerários de Campismo de Exemplo"
pkgs_camping_itineraries_desc = "Todos os itinerários são totalmente personalizáveis — combine parques de campismo e noites em lodges conforme o seu estilo."
pkgs_camping_itin1_title = "Safari de Campismo de 5 Dias em Etosha"
pkgs_camping_itin1_desc = "Uma experiência imersiva de vida selvagem numa das principais reservas de caça de África — game drives, charcos e noites sob as estrelas dentro do Parque Nacional Etosha."
pkgs_camping_itin2_title = "Safari de Campismo de 4 Dias em Sossusvlei"
pkgs_camping_itin2_desc = "Maravilhe-se com as paisagens deslumbrantes de Sossusvlei — dunas vermelhas imponentes, o surreal Deadvlei e as paisagens desérticas únicas do Parque Namib-Naukluft."
pkgs_camping_itin3_title = "Safari Selvagem de 7 Dias em Wolwedans"
pkgs_camping_itin3_desc = "Mergulhe no coração da Reserva Natural NamibRand — uma das paisagens desérticas mais intocadas e preservadas da Namíbia."
pkgs_view_itinerary = "Ver Itinerário"
pkgs_camping_good_know_1 = "Aconselhamos sobre a adequação da rota com base na estação, experiência de condução e escolha do veículo."
pkgs_camping_good_know_2 = "Podemos organizar aluguer de equipamento de campismo, preparação de veículos e sugestões de paragens para abastecimento."
pkgs_camping_good_know_3 = "Alguns parques têm requisitos de acesso rigorosos — ajudamos com licenças, reservas antecipadas e horários."
pkgs_camping_good_know_4 = "Segurança e conforto são importantes — podemos combinar campismo com noites em lodge para corresponder ao seu estilo e orçamento."

