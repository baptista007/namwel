; ── Destino: Namíbia ──────────────────────────────────────────────────────
dest_namibia_subtitle = "Desertos, dunas e céus estrelados — uma escapadinha como nenhuma outra na Terra."
dest_namibia_overview = "Parta numa aventura pela Namíbia para descobrir paisagens deslumbrantes — das dunas vermelhas do Deserto do Namibe aos maciços graníticos de Spitzkoppe e Brandberg. Desfrute de um safari em família no Parque Etosha, observando a vida selvagem reunir-se nos charcos iluminados. Explore lugares menos conhecidos como Kaokoland e as Quedas de Epupa, ou relaxe num cruzeiro para descobrir focas e golfinhos em Swakopmund e Walvis Bay. Conheça culturas locais como os Himba e os San para uma experiência de viagem verdadeiramente única."
dest_namibia_mustsee_title = "Locais Imperdíveis na Namíbia"
dest_namibia_mustsee_desc = "Paisagens espectaculares, vida selvagem notável e aventuras ao ar livre inesquecíveis."
dest_namibia_place1_title = "Parque Nacional Etosha"
dest_namibia_place1_desc = "Uma das reservas de caça mais importantes de África, no norte da Namíbia. Lar de leões, elefantes, rinocerontes e centenas de espécies de aves — todos reunindo-se em torno dos famosos charcos da salina."
dest_namibia_place2_title = "Sossusvlei & Deadvlei"
dest_namibia_place2_desc = "As dunas de areia mais altas do mundo. Dentro do Parque Namib-Naukluft, Sossusvlei e Deadvlei são duas das paisagens mais icónicas da Namíbia — especialmente deslumbrantes ao nascer do sol."
dest_namibia_place3_title = "Swakopmund & a Costa"
dest_namibia_place3_desc = "Uma encantadora cidade costeira com carácter colonial alemão. Use-a como base para sandboarding nas dunas, cruzeiros para ver focas, quad biking no deserto e observação de golfinhos em Walvis Bay."
dest_namibia_place4_title = "Fish River Canyon"
dest_namibia_place4_desc = "O segundo maior desfiladeiro do mundo estende-se por mais de 160 km no sul da Namíbia. Miradouros dramáticos, trilhos de caminhada de vários dias e uma sensação de absoluta solidão fazem dele uma das grandes maravilhas de África."
dest_namibia_place5_title = "Costa dos Esqueletos"
dest_namibia_place5_desc = "Um dos trechos costeiros mais remotos e selvagens do mundo — naufrágios, colónias de focas, leões adaptados ao deserto e o Atlântico implacável. Um destino de aventura como nenhum outro."
dest_namibia_place6_title = "Damaraland & Kaokoland"
dest_namibia_place6_desc = "Paisagens montanhosas remotas e dramáticas onde pode encontrar gravuras rupestres, conhecer o povo Himba e procurar elefantes adaptados ao deserto e rinocerontes-negros numa das regiões mais belas e selvagens da Namíbia."
dest_namibia_cta_title = "Planeie a Sua Aventura na Namíbia"
dest_namibia_cta_desc = "De campismo self-drive a lodges de luxo, conhecemos a Namíbia por dentro e por fora. Receba o seu itinerário personalizado em até 24 horas."

; ── Destino: Botswana ─────────────────────────────────────────────────────
dest_botswana_subtitle = "Vastos espaços selvagens, camps de safari intimistas e encontros com a vida selvagem entre os melhores de África."
dest_botswana_overview = "Descubra o Botswana, uma jóia da África Austral. Explore o Delta do Okavango, lar de uma vida selvagem incrível, de leões a crocodilos. Viva a atmosfera mística dos pântanos de Moremi e embarque num safari tradicional de mokoro. Não perca o Parque Nacional Chobe, famoso pelas suas extraordinárias concentrações de elefantes e paisagens magníficas. As férias no Botswana centram-se em safaris, muitas vezes em camps remotos e luxuosos, longe das multidões."
dest_botswana_mustsee_title = "Locais Imperdíveis no Botswana"
dest_botswana_mustsee_desc = "Paisagens espectaculares, vida selvagem extraordinária e aventuras ao ar livre esperam por si."
dest_botswana_place1_title = "Parque Nacional Chobe"
dest_botswana_place1_desc = "Lar das maiores concentrações de vida selvagem da África Austral — com populações de elefantes entre 50.000 e 70.000. Um parque imperdível para qualquer amante de safaris."
dest_botswana_place2_title = "Delta do Okavango"
dest_botswana_place2_desc = "O mágico e mundialmente famoso Delta do Okavango é um dos grandes destaques de uma viagem ao Botswana — o maior delta interior da Terra, onde o Rio Okavango encontra o Kalahari."
dest_botswana_place3_title = "Parque Transfronteiriço Kgalagadi"
dest_botswana_place3_desc = "Considerado um dos melhores parques de África para observar grandes felinos. Os famosos leões de juba negra do Kalahari são frequentemente avistados, juntamente com chitas e leopardos."
dest_botswana_cta_title = "Planeie o Seu Safari no Botswana"
dest_botswana_cta_desc = "Somos especialistas em planeamento de safaris no Botswana — rotas self-drive, camps fly-in e combinações multi-país. Peça a sua cotação gratuita hoje."

; ── Destino: Zimbabwe ─────────────────────────────────────────────────────
dest_zimbabwe_subtitle = "Cataratas Vitória, ruínas antigas, vida selvagem extraordinária e um destino de aventura emergente no coração da África Austral."
dest_zimbabwe_overview = "O Zimbabwe, situado no coração da África Austral, é um destino cativante que convida viajantes em busca de aventuras autênticas. O país possui paisagens deslumbrantes, vida selvagem rica e diversificada e locais culturais e históricos excepcionais. Além das suas maravilhas naturais, o Zimbabwe tem um património rico — das ruínas do Grande Zimbabwe à arte rupestre San, e às cidades coloniais de Bulawayo e Harare."
dest_zimbabwe_mustsee_title = "Locais Imperdíveis no Zimbabwe"
dest_zimbabwe_mustsee_desc = "Cenários deslumbrantes, vida selvagem extraordinária e aventuras ao ar livre esperam por si neste país notável."
dest_zimbabwe_place1_title = "Cataratas Vitória"
dest_zimbabwe_place1_desc = "Conhecidas como Mosi-oa-Tunya — \"a fumaça que troveja\" — no Rio Zambeze, na fronteira entre a Zâmbia e o Zimbabwe. Uma das sete maravilhas naturais do mundo e uma das imagens mais icónicas de África."
dest_zimbabwe_place2_title = "Parque Nacional Hwange"
dest_zimbabwe_place2_desc = "Um dos maiores parques nacionais de África e o destino de safari mais popular do Zimbabwe. Com mais de 14.600 km², abriga algumas das maiores populações de elefantes do continente."
dest_zimbabwe_place3_title = "Colinas de Matobo"
dest_zimbabwe_place3_desc = "Património Mundial da UNESCO com antigas pinturas rupestres San, dramáticos kopjes graníticos e rastreamento de rinocerontes-brancos. Uma paisagem profundamente espiritual e historicamente significativa."
dest_zimbabwe_place4_title = "Ruínas do Grande Zimbabwe"
dest_zimbabwe_place4_desc = "A antiga cidade de pedra que dá nome ao país. Estas notáveis ruínas do século XI são a maior estrutura de pedra da África Subsaariana e um poderoso símbolo da civilização pré-colonial."
dest_zimbabwe_place5_title = "Rio Zambeze & Lago Kariba"
dest_zimbabwe_place5_desc = "Cruzeiros ao pôr do sol no Zambeze, pesca de tiger fish no Lago Kariba e safaris em houseboat num dos maiores lagos artificiais do mundo — um lado completamente diferente da vida selvagem do Zimbabwe."
dest_zimbabwe_place6_title = "Parque Nacional Mana Pools"
dest_zimbabwe_place6_desc = "Património Mundial da UNESCO na planície aluvial do Zambeze — conhecido por safaris a pé com encontros extraordinariamente próximos com a vida selvagem. Uma das verdadeiras jóias selvagens de África, acessível de Maio a Outubro."
dest_zimbabwe_cta_title = "Planeie a Sua Aventura no Zimbabwe"
dest_zimbabwe_cta_desc = "O Zimbabwe é frequentemente combinado com Botswana ou Zâmbia para um itinerário multi-país épico. Deixe-nos desenhar a sua viagem perfeita."

; ── Destino: África do Sul ────────────────────────────────────────────────
dest_south_africa_subtitle = "A nação arco-íris — paisagens deslumbrantes, vida selvagem icónica, vinhos de classe mundial e cultura vibrante."
dest_south_africa_overview = "A África do Sul, a nação arco-íris situada no extremo sul do continente africano, é um caleidoscópio cativante de maravilhas. De paisagens deslumbrantes e encontros culturais autênticos a vida selvagem e flora extraordinárias, a África do Sul promete uma viagem inesquecível para almas aventureiras em busca de experiências únicas fora dos caminhos comuns."
dest_south_africa_mustsee_title = "Locais Imperdíveis na África do Sul"
dest_south_africa_mustsee_desc = "Paisagens icónicas, vida selvagem extraordinária e experiências de classe mundial."
dest_south_africa_place1_title = "Table Mountain"
dest_south_africa_place1_desc = "A icónica montanha de topo plano da Cidade do Cabo domina uma das cidades mais bonitas do mundo. Suba de teleférico para vistas panorâmicas ou percorra um dos vários trilhos até ao cume."
dest_south_africa_place2_title = "Parque Nacional Kruger"
dest_south_africa_place2_desc = "Um dos maiores parques nacionais de África e um destino de safari de classe mundial, lar dos Big Five — elefantes, leões, leopardos, rinocerontes e búfalos."
dest_south_africa_place3_title = "A Garden Route"
dest_south_africa_place3_desc = "Esta estrada costeira cénica ao longo da costa sul oferece vistas espectaculares do Oceano Índico, vilas encantadoras, caminhadas, surf e encontros com a vida selvagem pelo caminho."
dest_south_africa_place4_title = "Montanhas Drakensberg"
dest_south_africa_place4_desc = "Património Mundial da UNESCO, famoso por falésias espectaculares, vales verdejantes e vistas panorâmicas. Caminhadas excepcionais, arte rupestre San antiga e escarpas dramáticas."
dest_south_africa_faq_title = "Perguntas Frequentes"
dest_south_africa_faq_subtitle = "A planear uma viagem à África do Sul? Aqui estão respostas às perguntas mais comuns."
dest_south_africa_faq1_q = "Qual é a melhor época para visitar a África do Sul?"
dest_south_africa_faq1_a = "A África do Sul é um destino para todo o ano, mas a época ideal depende dos seus interesses. Para safaris, os meses secos de inverno (Maio a Setembro) são os melhores. Para férias de praia ou a Garden Route, os meses de verão (Novembro a Março) são ideais."
dest_south_africa_faq2_q = "Preciso de visto para visitar a África do Sul?"
dest_south_africa_faq2_a = "Os requisitos de visto dependem da sua nacionalidade. Muitos países, incluindo UE, EUA, Reino Unido e SADC, beneficiam de entrada sem visto para estadias até 90 dias. Consulte a embaixada sul-africana mais próxima antes de viajar."
dest_south_africa_faq3_q = "Que moeda é utilizada e posso pagar com cartão?"
dest_south_africa_faq3_a = "A moeda é o Rand Sul-Africano (ZAR). Cartões são amplamente aceites em cidades, hotéis e restaurantes. É aconselhável levar algum dinheiro para zonas rurais e mercados locais."
dest_south_africa_cta_title = "Planeie a Sua Viagem à África do Sul"
dest_south_africa_cta_desc = "Safari, costa, regiões vinícolas ou os três — criaremos o itinerário perfeito pela África do Sul para si."
dest_get_a_quote = "Solicitar Cotação"

; ── Destino: Angola ───────────────────────────────────────────────────────
dest_angola_subtitle = "Um destino cativante fora dos caminhos habituais — paisagens deslumbrantes, cultura rica e vida selvagem única."
dest_angola_overview = "Parta numa aventura em Angola e descubra paisagens deslumbrantes — das espectaculares Quedas de Kalandula às belas costas de Benguela. Desfrute de um safari em família no Parque Nacional da Quiçama, observe a vida selvagem no seu habitat natural e explore jóias escondidas como a Fenda da Tundavala e as antigas pinturas rupestres de Tchitundu-Hulu. Relaxe nas praias serenas de Luanda e Namibe, ou faça um cruzeiro pelo Rio Kwanza para admirar a avifauna diversa e paisagens pitorescas."
dest_angola_mustsee_title = "Locais Imperdíveis em Angola"
dest_angola_mustsee_desc = "Descubra praias paradisíacas, parques nacionais e cidades históricas."
dest_angola_place1_title = "Namibe"
dest_angola_place1_desc = "A província costeira do Namibe, em Angola, oferece praias deslumbrantes, paisagens desérticas e um rico património cultural. Os visitantes podem explorar a histórica cidade do Namibe, relaxar em praias intocadas e descobrir a biodiversidade única da região."
dest_angola_place2_title = "Parque Nacional da Kissama"
dest_angola_place2_desc = "Este vasto parque é lar de elefantes, leões, girafas e zebras. Os visitantes podem fazer safaris para observar estas criaturas majestosas no seu habitat natural, ou caminhar por florestas tropicais exuberantes."
dest_angola_place3_title = "Quedas de Kalandula"
dest_angola_place3_desc = "Estas quedas espectaculares — as segundas mais altas de África — são uma verdadeira maravilha natural. Admire-as à distância ou caminhe até à base para vê-las de perto. Um espectáculo de tirar o fôlego a não perder."
dest_angola_place4_title = "Benguela"
dest_angola_place4_desc = "Esta cidade histórica apresenta edifícios coloniais bem preservados, incluindo o Forte de São Filipe de Benguela e a Igreja de Nossa Senhora do Pópulo. Relaxe em praias arenosas ou explore os mercados animados da cidade."
dest_angola_place5_title = "Lobito"
dest_angola_place5_desc = "Esta cidade costeira é conhecida pelas suas belas praias, águas turquesa e ambiente descontraído. Perfeita para nadar, apanhar sol, surfar ou explorar lojas e restaurantes locais."
dest_angola_place6_title = "Parque Nacional Luengue-Luiana"
dest_angola_place6_desc = "Localizado no sudeste de Angola, este vasto parque abrange savana, floresta e zonas húmidas. Abriga uma vida selvagem rica, incluindo elefantes, leões, leopardos e crocodilos."
dest_angola_hidden_gem = "Jóia Escondida"
dest_angola_cta_title = "Pronto Para Explorar Angola?"
dest_angola_cta_desc = "Deixe-nos criar um itinerário personalizado por Angola para si. Solicite uma cotação gratuita e entraremos em contacto em até 24 horas."

; ── Destino: Zâmbia ───────────────────────────────────────────────────────
dest_zambia_subtitle = "Selvagem, autêntica e tranquila — a Zâmbia é a grande fronteira intocada de safari da África Austral."
dest_zambia_overview = "A Zâmbia é o segredo mais bem guardado da África Austral — uma terra de parques nacionais selvagens e remotos, safaris a pé lendários e as estrondosas Cataratas Vitória partilhadas com o Zimbabwe. Do intocado Vale de South Luangwa ao vasto Parque Nacional Kafue, a Zâmbia oferece uma experiência de safari íntima e sem multidões, incomparável."
dest_zambia_highlight1 = "Cataratas Vitória (Mosi-oa-Tunya) — partilhadas com o Zimbabwe"
dest_zambia_highlight2 = "Parque Nacional South Luangwa — um dos melhores de África para safaris a pé"
dest_zambia_highlight3 = "Parque Nacional Lower Zambezi — safaris de canoa ao longo do Zambeze"
dest_zambia_highlight4 = "Parque Nacional Kafue — um dos maiores parques do mundo"
dest_zambia_cta_title = "Explore a Zâmbia Com a Namwel"
dest_zambia_cta_desc = "A Zâmbia é frequentemente combinada com Zimbabwe e Botswana para itinerários multi-país épicos. Solicite uma cotação e criaremos a viagem perfeita para si."

; ── Índice de Destinos ────────────────────────────────────────────────────
dest_namibia_desc = "Dunas desérticas, céus abertos, vida selvagem abundante e costas dramáticas. A Namíbia é uma das últimas grandes regiões selvagens do mundo — ideal tanto para safaris self-drive como guiados."
dest_namibia_highlight1 = "Sossusvlei & Parque Nacional Etosha"
dest_namibia_highlight2 = "Costa dos Esqueletos & Damaraland"
dest_botswana_desc = "O melhor destino de safari de África — remoto, intocado e repleto de vida selvagem. O Delta do Okavango e o Parque Nacional Chobe estão entre as maiores maravilhas naturais do mundo."
dest_botswana_highlight1 = "Delta do Okavango & PN Chobe"
dest_botswana_highlight2 = "Parque Transfronteiriço Kgalagadi"
dest_zimbabwe_desc = "Cataratas Vitória, ruínas antigas, vida selvagem extraordinária e uma cultura calorosa. O Zimbabwe é um destino em ascensão que oferece experiências de classe mundial sem as multidões."
dest_zimbabwe_highlight1 = "Cataratas Vitória & PN Hwange"
dest_zimbabwe_highlight2 = "Colinas de Matobo & Mana Pools"
dest_south_africa_desc = "Um país de contrastes extraordinários — vida selvagem icónica, vinhas de classe mundial, costas dramáticas e a energia cosmopolita da Cidade do Cabo e Joanesburgo."
dest_south_africa_highlight1 = "PN Kruger & Table Mountain"
dest_south_africa_highlight2 = "Garden Route & Drakensberg"
