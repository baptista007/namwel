home_pkg1_location = "Botswana / Namíbia / Zâmbia"
home_pkg1_title = "O tesouro da África Austral"
home_pkg1_duration = "15 Dias / 14 Noites"
home_pkg1_desc = "Este tour de 14 dias leva-o ao coração da África Austral, uma região de riqueza natural e cultural excepcional. Da Namíbia, com as suas dunas espectaculares e vida selvagem abundante, ao Botswana e aos seus famosos parques nacionais, e finalmente às majestosas Cataratas Vitória no Zimbabwe, cada paragem oferece uma imersão em paisagens únicas e tradições autênticas."
home_pkg2_location = "Botswana / Namíbia / Zimbabwe"
home_pkg2_title = "Fascinante África Austral"
home_pkg2_duration = "17 Dias / 16 Noites"
home_pkg2_desc = "Embarque numa viagem excepcional pela África Austral com o nosso tour Fascinante África Austral, uma aventura completa de 17 dias que liga três países icónicos: Namíbia, Botswana e Zimbabwe."
home_pkg3_location = "Namíbia"
home_pkg3_title = "Grandes Espaços da Namíbia"
home_pkg3_duration = "14 Dias / 13 Noites"
home_pkg3_desc = "Embarque numa aventura de 14 dias explorando as vastas paisagens da Namíbia: Parque Nacional Etosha, Damaraland, Costa dos Esqueletos, Deserto do Namibe e Kalahari. Desfrute de safaris, paisagens deslumbrantes e imersão cultural no coração da natureza namibiana. Este tour guiado é ideal para pequenos grupos que procuram aventura e conforto."
home_pkg4_location = "Namíbia"
home_pkg4_title = "Um passeio pelo Okavango"
home_pkg4_duration = "7 Dias / 6 Noites"
home_pkg4_desc = "A viagem ao coração do Delta do Okavango é uma experiência de safari imersiva pela Namíbia, Botswana e Zimbabwe, oferecendo um equilíbrio perfeito entre vida selvagem, paisagens fluviais e maravilhas naturais icónicas."
home_pkg4_highlights = "Destaques"
