pkgs_honeymoon_page_title = "Pacotes de Lua de Mel"
pkgs_honeymoon_page_subtitle = "Romântico, privado e sem complicações — concebido em torno de conforto, paisagens e experiências memoráveis para dois."
pkgs_honeymoon_section_title = "A Sua Lua de Mel Com a Namwel"
pkgs_honeymoon_intro_1 = "Com a Namwel Tours, a sua lua de mel oferece intimidade e toques especiais, como safaris com transporte privado, piqueniques ou jantares à luz de velas, e muitas outras surpresas. Férias românticas na Namíbia significam poder viver o isolamento de uma escapadinha num retiro privado de luxo — apenas você e o seu parceiro, com um guia privado à sua disposição."
pkgs_honeymoon_intro_2 = "A Namwel oferecer-lhe-á relaxamento em hotéis de luxo de quatro e cinco estrelas ou guesthouses intimistas, com a possibilidade de assistir ao pôr do sol a partir do seu terraço privado ou saborear café na cama enquanto os animais bebem água a poucos metros."
