about_intro_1 = "A Namwel Tours and Car Rentals é uma agência local namibiana especializada em viagens feitas à medida e tours para pequenos grupos. Inspirados pelas vastas paisagens da Namíbia, criamos itinerários que combinam relaxamento, encanto e proximidade com a natureza. A nossa equipa apaixonada acompanha-o com profissionalismo para tornar o seu safari uma experiência única e inesquecível, onde cada detalhe conta."
about_intro_2 = "Fundada em 2017, a Namwel nasceu com uma visão clara: oferecer aos viajantes um serviço fiável que combina aluguer premium de viaturas com experiências de viagem profundamente autênticas pela Namíbia e África Austral. Desde o primeiro dia, a Namwel posicionou-se como um parceiro de confiança para viajantes locais e internacionais que desejam explorar a Namíbia e o resto da África Austral através de safaris, vida selvagem, paisagens e património cultural."
about_vision_desc = "Partilhar o nosso conhecimento e paixão pela Namíbia e África Austral com todos os viajantes — indivíduos, famílias e grupos — que procuram experiências autênticas e memoráveis nesta região extraordinária."
about_mission_desc = "Estabelecer parcerias colaborativas com intervenientes locais e internacionais para apoiar iniciativas de desenvolvimento comunitário em toda a região, ao mesmo tempo que proporcionamos experiências de viagem excepcionais."
about_values_desc = "Paixão por viajar · Colaboração e parcerias · Empoderamento comunitário · Sustentabilidade e responsabilidade ambiental · Uma abordagem centrada no cliente em cada etapa."
about_why_desc = "O nosso compromisso com a satisfação do cliente, opções de viagem diversificadas e abordagem orientada para a comunidade diferenciam-nos como operador turístico líder na Namíbia. Eis por que os viajantes confiam em nós para aventuras inesquecíveis."
about_comm1_desc = "Os nossos circuitos incluem visitas a projectos de turismo comunitário, como quintas tradicionais e aldeias culturais. Esta abordagem permite aos viajantes descobrir a cultura namibiana autêntica, ao mesmo tempo que gera rendimento para as comunidades locais."
about_comm2_desc = "A Namwel contribui activamente para a criação de emprego local ao contratar guias turísticos, motoristas e pessoal de apoio das comunidades namibianas — oferecendo oportunidades de rendimento sustentável e promovendo o desenvolvimento de competências."
about_comm3_desc = "Damos prioridade à aquisição de produtos e serviços junto de fornecedores locais — alojamentos, artesãos e vendedores de alimentos — ajudando a estimular a economia local e a criar oportunidades sustentáveis para pequenas e médias empresas."
about_ceo_languages = "Especialista em Inglês, Francês e Português"
about_ceo_title = "Fundador & Director Executivo"
about_ceo_desc = "Fernando traz uma vasta experiência para a Namwel — tendo trabalhado como guia profissional, guia independente e director de operações por mais de 23 anos. Ao fundar a Namwel em 2017, movido por uma profunda paixão pela Namíbia e África Austral, construiu uma equipa forte de guias profissionais dedicados a proporcionar experiências de viagem de alta qualidade e inesquecíveis."
about_drivers_desc = "Os nossos motoristas profissionais garantem viagens seguras e confortáveis por toda a Namíbia. Com anos de experiência em terrenos variados, asseguram percursos tranquilos, seja numa aventura self-drive ou numa excursão guiada. Segurança, fiabilidade e satisfação do cliente são as suas prioridades."
about_guides_desc = "Os nossos guias turísticos experientes dão vida à Namíbia! De safaris de vida selvagem a excursões culturais, partilham conhecimento especializado e histórias cativantes para uma experiência imersiva e inesquecível. Simpáticos, multilingues e conhecedores — tornam cada viagem extraordinária."
