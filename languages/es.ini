quote_faq1_q = "¿Cuánto tiempo tarda en llegar el presupuesto?"
quote_faq1_a = "Nos esforzamos por enviar todos los presupuestos en 24 horas. En temporada alta puede tardar hasta 48 horas. Para itinerarios complejos con múltiples destinos, puede que necesitemos algo más de tiempo para asegurarnos de ofrecerte las mejores opciones."
quote_faq2_q = "¿Qué incluye el presupuesto?"
quote_faq2_a = "Cada presupuesto incluye un itinerario detallado día a día, opciones de alojamiento con fotos, todas las actividades y traslados, comidas según las especificaciones, servicios de guía experto y el precio total desglosado. Nos enorgullecemos de ofrecer precios transparentes sin cargos ocultos."
quote_faq3_q = "¿Puedo modificar mi presupuesto después de recibirlo?"
quote_faq3_a = "¡Por supuesto! Entendemos que los planes pueden cambiar. Puedes solicitar modificaciones en tu itinerario, las opciones de alojamiento o las fechas de viaje en cualquier momento. Trabajaremos contigo para encontrar la solución perfecta."
quote_faq4_q = "¿Cuál es la mejor época para visitar Namibia?"
quote_faq4_a = "Namibia es un destino abierto todo el año. La mejor época para observar fauna es de mayo a octubre, cuando los animales se concentran en los puntos de agua. Para las famosas dunas de Sossusvlei, cualquier época ofrece vistas espectaculares. Nuestro equipo puede aconsejarte sobre el mejor momento según tus intereses."
