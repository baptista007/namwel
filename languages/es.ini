; ── Packages: Honeymoon ───────────────────────────────────────────────────
pkgs_honeymoon_page_title = "Paquetes de luna de miel"
pkgs_honeymoon_page_subtitle = "Romántico, privado y sin complicaciones — diseñado en torno al confort, los paisajes y las experiencias memorables para dos."
pkgs_honeymoon_section_title = "Tu luna de miel con Namwel"
pkgs_honeymoon_intro_1 = "Con Namwel Tours, tu luna de miel ofrece intimidad y detalles especiales como safaris en transporte privado, pícnics o cenas a la luz de las velas, y muchas otras sorpresas. Las escapadas románticas en Namibia te permiten vivir el aislamiento de un retiro de lujo privado — solo vosotros dos, con un guía privado a vuestra disposición."
pkgs_honeymoon_intro_2 = "Namwel te ofrecerá relax en hoteles de lujo o casas de huéspedes íntimas de cuatro y cinco estrellas, con la posibilidad de contemplar un atardecer desde tu terraza privada o tomar café en la cama mientras los animales beben en un punto de agua a pocos metros."
