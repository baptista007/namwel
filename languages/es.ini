pkgs_honeymoon_stars_desc = "Encuentros con la fauna durante el día, un cielo lleno de estrellas por la noche. Íntimas estancias en lodge en Etosha o en una reserva privada — con itinerarios adaptados a la fotografía y cenas a la luz de las velas en la sabana."
