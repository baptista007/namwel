home_pkg1_location = "Botsuana / Namibia / Zambia"
home_pkg1_title = "El tesoro del sur de África"
home_pkg1_duration = "15 días / 14 noches"
home_pkg1_desc = "Este circuito de 14 días te lleva al corazón del sur de África, una región de excepcional riqueza natural y cultural. Desde Namibia, con sus espectaculares dunas y abundante fauna, hasta Botsuana y sus famosos parques nacionales, y finalmente las majestuosas cataratas Victoria en Zimbabwe, cada parada ofrece una inmersión en paisajes únicos y tradiciones auténticas."
home_pkg2_location = "Botsuana / Namibia / Zimbabwe"
home_pkg2_title = "El fascinante sur de África"
home_pkg2_duration = "17 días / 16 noches"
home_pkg2_desc = "Embárcate en un viaje excepcional por el sur de África con nuestro circuito El fascinante sur de África, una completa aventura de 17 días que une tres países emblemáticos: Namibia, Botsuana y Zimbabwe."
home_pkg3_location = "Namibia"
home_pkg3_title = "Los grandes espacios namibios"
home_pkg3_duration = "14 días / 13 noches"
home_pkg3_desc = "Embárcate en una aventura de 14 días explorando los vastos paisajes de Namibia: el Parque Nacional de Etosha, Damaraland, la Skeleton Coast, el desierto del Namib y el Kalahari. Disfruta de safaris, paisajes impresionantes e inmersión cultural en el corazón de la naturaleza namibia. Este circuito guiado es ideal para grupos pequeños que buscan aventura y comodidad."
home_pkg4_location = "Namibia"
home_pkg4_title = "Un paseo por el Okavango"
home_pkg4_duration = "7 días / 6 noches"
home_pkg4_desc = "El viaje al corazón del delta del Okavango es una experiencia safari inmersiva por Namibia, Botsuana y Zimbabwe, que ofrece un equilibrio perfecto entre fauna, paisajes fluviales y maravillas naturales emblemáticas."
