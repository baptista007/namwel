; ── Packages: Camping & Overland ─────────────────────────────────────────
pkgs_camping_page_title = "Camping & Overland"
pkgs_camping_page_subtitle = "Para los viajeros que aman la carretera abierta — rutas de camping 4x4, parques nacionales y circuitos multipaís."
pkgs_camping_section_title = "Qué esperar en un safari de camping"
pkgs_camping_intro_1 = "Para los amantes de la naturaleza y los grandes espacios abiertos, el safari de camping es la opción ideal para acercarse a las impresionantes maravillas naturales de Namibia. La palabra safari significa <strong>\"viaje\"</strong> — y con Namwel, el safari te devuelve a una conexión personal con la Naturaleza. Los safaris de camping ofrecen una experiencia íntima: transporte privado, cenas a la luz de las velas bajo las estrellas, pícnics en paisajes remotos y sorpresas a cada paso."
pkgs_camping_intro_2 = "Elige entre circuitos guiados o circuitos de camping en self-drive. Podemos organizar noches en lodges de cuatro y cinco estrellas junto a los campamentos, dándote lo mejor de ambos mundos — aventura de día, comodidad de noche."
pkgs_camping_feat1_title = "4x4 y Self-Drive"
pkgs_camping_feat1_sub = "Guiado o independiente"
pkgs_camping_feat2_title = "Campamentos bajo las estrellas"
pkgs_camping_feat2_sub = "Cero contaminación lumínica"
pkgs_camping_feat3_title = "Alquiler de equipo"
pkgs_camping_feat3_sub = "Kit completo disponible"
pkgs_camping_feat4_title = "Cenas en la sabana"
pkgs_camping_feat4_sub = "A la luz de las velas y en privado"
pkgs_camping_destinations_title = "Destinos de camping seleccionados"
pkgs_camping_destinations_desc = "Lugares cuidadosamente elegidos que ofrecen paisajes impresionantes, encuentros únicos con la fauna y aventuras excepcionales al aire libre."
pkgs_camping_place1_title = "Namutoni Rest Camp"
pkgs_camping_place1_desc = "Un encantador refugio dentro del Parque Nacional de Etosha, construido alrededor de un histórico fuerte alemán. Ofrece alojamiento confortable, un restaurante y un punto de agua donde los visitantes pueden observar animales a corta distancia."
pkgs_camping_place2_title = "Halali Rest Camp"
pkgs_camping_place2_desc = "Un refugio tranquilo en el corazón de Etosha, que ofrece una atmósfera serena y una excelente observación de fauna. Su ubicación estratégica lo convierte en una base ideal para explorar los variados paisajes y la fauna de Etosha."
pkgs_camping_place3_title = "Sossusvlei y Deadvlei"
pkgs_camping_place3_desc = "Maravíllate ante las dunas más altas del mundo y la surrealista sartén de arcilla blanca de Deadvlei al amanecer. Acampar en el Namib-Naukluft es una experiencia inolvidable — silencio, estrellas y antigua arena roja."
pkgs_camping_place4_title = "Wolwedans Boulders"
pkgs_camping_place4_desc = "Un safari de 7 días en plena naturaleza en el corazón de la Reserva Natural NamibRand — uno de los paisajes desérticos más protegidos de Namibia. Íntimo, inmersivo y extraordinario."
pkgs_camping_place5_title = "Delta del Okavango y Chobe"
pkgs_camping_place5_desc = "Cruza a Botsuana para una observación de fauna de primer nivel. Acampar a lo largo del río Chobe y en el corazón del delta del Okavango ofrece algunos de los encuentros con la fauna más espectaculares del continente."
pkgs_camping_place6_title = "Skeleton Coast y Damaraland"
pkgs_camping_place6_desc = "Remoto, espectacular y totalmente salvaje. La Skeleton Coast y Damaraland ofrecen elefantes adaptados al desierto, antiguas grabaciones rupestres en Twyfelfontein y una costa como ninguna otra en la Tierra."
pkgs_camping_itineraries_title = "Ejemplos de itinerarios de camping"
pkgs_camping_itineraries_desc = "Todos los itinerarios son totalmente personalizables — combina campamentos y noches en lodge según tu estilo."
pkgs_camping_itin1_title = "Safari de camping en Etosha de 5 días"
pkgs_camping_itin1_desc = "Una experiencia inmersiva con la fauna en una de las principales reservas de África — rutas de juego, puntos de agua y noches bajo las estrellas dentro del Parque Nacional de Etosha."
pkgs_camping_itin2_title = "Safari de camping en Sossusvlei de 4 días"
pkgs_camping_itin2_desc = "Maravíllate ante los impresionantes paisajes de Sossusvlei — imponentes dunas rojas, surrealista Deadvlei y los únicos paisajes desérticos del Parque Namib-Naukluft."
pkgs_camping_itin3_title = "Safari de naturaleza en Wolwedans de 7 días"
pkgs_camping_itin3_desc = "Sumérgete en el corazón de la Reserva Natural NamibRand — uno de los paisajes desérticos más prístinos y preservados de Namibia."
pkgs_view_itinerary = "Ver itinerario"
pkgs_camping_good_know_1 = "Asesoramos sobre la idoneidad de la ruta según la temporada, la experiencia de conducción y la elección del vehículo."
pkgs_camping_good_know_2 = "Podemos organizar el alquiler de equipo de camping, la preparación de vehículos y sugerir paradas de aprovisionamiento."
pkgs_camping_good_know_3 = "Algunos parques tienen requisitos de acceso estrictos — te ayudamos con permisos, reservas anticipadas y horarios."
pkgs_camping_good_know_4 = "La seguridad y la comodidad importan — podemos combinar camping con noches en lodge según tu estilo y presupuesto."

