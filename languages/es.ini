; ── Destination: Namibia ──────────────────────────────────────────────────
dest_namibia_subtitle = "Desiertos, dunas y cielos estrellados — una escapada como ninguna otra en la Tierra."
dest_namibia_overview = "Embárcate en una aventura en Namibia para descubrir paisajes impresionantes — desde las dunas rojas del desierto del Namib hasta los macizos de granito de la Spitzkoppe y el Brandberg. Disfruta de un safari familiar en el Parque Etosha, observando cómo la fauna se reúne en los puntos de agua iluminados. Explora lugares menos conocidos como Kaokoland y las cataratas de Epupa, o relájate en un crucero descubriendo focas y delfines en Swakopmund y Walvis Bay. Conoce culturas locales como los Himba y los Bushmen para una experiencia de viaje verdaderamente única."
dest_namibia_mustsee_title = "Imprescindibles en Namibia"
dest_namibia_mustsee_desc = "Paisajes espectaculares, fauna notable y aventuras al aire libre inolvidables."
dest_namibia_place1_title = "Parque Nacional de Etosha"
dest_namibia_place1_desc = "Una de las reservas naturales más importantes de África, en el norte de Namibia. Hogar de leones, elefantes, rinocerontes y cientos de especies de aves — todos reuniéndose en los famosos puntos de agua del salar."
dest_namibia_place2_title = "Sossusvlei y Deadvlei"
dest_namibia_place2_desc = "Las dunas de arena más altas del mundo. Dentro del Parque Namib-Naukluft, Sossusvlei y Deadvlei son dos de los paisajes más emblemáticos de Namibia — especialmente impresionantes al amanecer."
dest_namibia_place3_title = "Swakopmund y la costa"
dest_namibia_place3_desc = "Un encantador pueblo costero con carácter colonial alemán. Úsalo como base para el sandboard en las dunas, cruceros con focas, quad por el desierto y avistamiento de delfines en Walvis Bay."
dest_namibia_place4_title = "Fish River Canyon"
dest_namibia_place4_desc = "El segundo cañón más grande del mundo se extiende más de 160 km por el sur de Namibia. Miradores espectaculares, rutas de senderismo de varios días y una sensación de soledad absoluta lo convierten en una de las grandes maravillas de África."
dest_namibia_place5_title = "Skeleton Coast"
dest_namibia_place5_desc = "Uno de los tramos de costa más remotos y salvajes del mundo — naufragios, colonias de focas, leones adaptados al desierto y el implacable Atlántico. Un destino de aventura como ningún otro."
dest_namibia_place6_title = "Damaraland y Okaokoland"
dest_namibia_place6_desc = "Paisajes de tierras altas remotos y dramáticos donde puedes encontrar grabados rupestres, conocer al pueblo Himba y buscar elefantes y rinocerontes negros adaptados al desierto en una de las regiones más bellas y salvajes de Namibia."
dest_namibia_cta_title = "Planifica tu aventura en Namibia"
dest_namibia_cta_desc = "Desde el camping self-drive hasta los lodges de lujo, conocemos Namibia a la perfección. Obtén tu itinerario personalizado en 24 horas."

; ── Destination: Botswana ─────────────────────────────────────────────────
dest_botswana_subtitle = "Vastos espacios salvajes, íntimos campamentos safari y encuentros con la fauna entre los más impresionantes de África."
dest_botswana_overview = "Descubre Botsuana, una joya del sur de África. Explora el delta del Okavango, hogar de una fauna increíble, desde leones hasta cocodrilos. Vive la atmósfera mística de los pantanos de Moremi y embárcate en un safari tradicional en mokoro. No te pierdas el Parque Nacional de Chobe, famoso por sus extraordinarias concentraciones de elefantes y sus magníficos paisajes. Las vacaciones en Botsuana giran en torno a los safaris, a menudo en campamentos remotos y lujosos lejos de las multitudes."
dest_botswana_mustsee_title = "Imprescindibles en Botsuana"
dest_botswana_mustsee_desc = "Te esperan paisajes espectaculares, fauna extraordinaria y aventuras al aire libre."
dest_botswana_place1_title = "Parque Nacional de Chobe"
dest_botswana_place1_desc = "Hogar de las mayores concentraciones de fauna del sur de África — con poblaciones de elefantes de entre 50.000 y 70.000. Un parque imprescindible para cualquier entusiasta del safari."
dest_botswana_place2_title = "Delta del Okavango"
dest_botswana_place2_desc = "El mágico y mundialmente famoso delta del Okavango es uno de los grandes atractivos de un viaje a Botsuana — el mayor delta interior de la Tierra, donde el río Okavango se encuentra con el Kalahari."
dest_botswana_place3_title = "Parque Transfronterizo de Kgalagadi"
dest_botswana_place3_desc = "Considerado uno de los mejores parques de África para observar grandes felinos. Los famosos leones de melena negra del Kalahari se ven con frecuencia, junto a guepardos y leopardos."
dest_botswana_cta_title = "Planifica tu safari en Botsuana"
dest_botswana_cta_desc = "Nos especializamos en la planificación de safaris en Botsuana — rutas self-drive, campamentos en avioneta y combinaciones multipaís. Solicita tu presupuesto gratuito hoy."

; ── Destination: Zimbabwe ─────────────────────────────────────────────────
dest_zimbabwe_subtitle = "Cataratas Victoria, ruinas antiguas, fauna extraordinaria y un destino de aventura emergente en el corazón del sur de África."
dest_zimbabwe_overview = "Zimbabwe, ubicado en el corazón del sur de África, es un destino cautivador que invita a los viajeros en busca de aventuras auténticas. El país cuenta con paisajes impresionantes, fauna rica y diversa, y excepcionales lugares culturales e históricos. Más allá de sus maravillas naturales, Zimbabwe tiene un rico patrimonio — desde las ruinas de Great Zimbabwe hasta el arte rupestre San, y las ciudades coloniales de Bulawayo y Harare."
dest_zimbabwe_mustsee_title = "Imprescindibles en Zimbabwe"
dest_zimbabwe_mustsee_desc = "Paisajes impresionantes, fauna extraordinaria y aventuras al aire libre te esperan en este notable país."
dest_zimbabwe_place1_title = "Cataratas Victoria"
dest_zimbabwe_place1_desc = "Conocidas como Mosi-oa-Tunya — \"el humo que truena\" — en el río Zambezi, en la frontera entre Zambia y Zimbabwe. Una de las siete maravillas naturales del mundo y el lugar más emblemático de África."
dest_zimbabwe_place2_title = "Parque Nacional de Hwange"
dest_zimbabwe_place2_desc = "Uno de los parques nacionales más grandes de África y el destino safari más popular de Zimbabwe. Con más de 14.600 km², alberga algunas de las mayores poblaciones de elefantes del continente."
dest_zimbabwe_place3_title = "Matobo Hills"
dest_zimbabwe_place3_desc = "Patrimonio Mundial de la UNESCO con antiguas pinturas rupestres San, dramáticos kopjes de granito y seguimiento del rinoceronte blanco. Un paisaje profundamente espiritual e históricamente significativo."
dest_zimbabwe_place4_title = "Ruinas del Great Zimbabwe"
dest_zimbabwe_place4_desc = "La antigua ciudad de piedra que da nombre al país. Estas notables ruinas del siglo XI son la mayor estructura de piedra del África subsahariana y un poderoso símbolo de la civilización precolonial."
dest_zimbabwe_place5_title = "Río Zambezi y lago Kariba"
dest_zimbabwe_place5_desc = "Cruceros al atardecer por el Zambezi, pesca del tigre en el lago Kariba y safaris en casa flotante en uno de los mayores lagos artificiales del mundo — un lado completamente diferente de la fauna de Zimbabwe."
dest_zimbabwe_place6_title = "Parque Nacional de Mana Pools"
dest_zimbabwe_place6_desc = "Patrimonio Mundial de la UNESCO en la llanura aluvial del Zambezi — conocido por los safaris a pie con extraordinarios encuentros cercanos con la fauna. Una de las verdaderas joyas salvajes de África, accesible de mayo a octubre."
dest_zimbabwe_cta_title = "Planifica tu aventura en Zimbabwe"
dest_zimbabwe_cta_desc = "Zimbabwe se combina frecuentemente con Botsuana o Zambia para un épico itinerario multipaís. Déjanos diseñar tu viaje perfecto."

; ── Destination: South Africa ─────────────────────────────────────────────
dest_south_africa_subtitle = "La nación arcoíris — paisajes impresionantes, fauna emblemática, vinos de clase mundial y cultura vibrante."
dest_south_africa_overview = "Sudáfrica, la nación arcoíris ubicada en la punta sur del continente africano, es un cautivador caleidoscopio de maravillas. Desde paisajes impresionantes y encuentros culturales auténticos hasta fauna y flora extraordinarias, Sudáfrica promete un viaje inolvidable para las almas aventureras que buscan experiencias únicas fuera de lo común."
dest_south_africa_mustsee_title = "Imprescindibles en Sudáfrica"
dest_south_africa_mustsee_desc = "Paisajes emblemáticos, fauna extraordinaria y experiencias de clase mundial."
dest_south_africa_place1_title = "Montaña de la Mesa"
dest_south_africa_place1_desc = "La icónica montaña de cima plana del Cabo domina una de las ciudades más bellas del mundo. Sube en teleférico para vistas panorámicas o sube a pie por alguno de los senderos hasta la cima."
dest_south_africa_place2_title = "Parque Nacional Kruger"
dest_south_africa_place2_desc = "Uno de los parques nacionales más grandes de África y un destino safari de clase mundial, hogar de los Cinco Grandes — elefantes, leones, leopardos, rinocerontes y búfalos."
dest_south_africa_place3_title = "La Ruta Jardín"
dest_south_africa_place3_desc = "Este pintoresco recorrido costero por la costa sur ofrece espectaculares vistas al océano Índico, encantadores pueblos, senderismo, surf y encuentros con la fauna a lo largo del camino."
dest_south_africa_place4_title = "Montes Drakensberg"
dest_south_africa_place4_desc = "Patrimonio Mundial de la UNESCO reconocido por sus espectaculares acantilados, frondosos valles y vistas panorámicas. Senderismo excepcional, arte rupestre San antiguo y dramáticos escarpes."
dest_south_africa_faq_title = "Preguntas frecuentes"
dest_south_africa_faq_subtitle = "¿Planificas un viaje a Sudáfrica? Aquí encontrarás las respuestas a las preguntas más habituales."
dest_south_africa_faq1_q = "¿Cuál es la mejor época para visitar Sudáfrica?"
dest_south_africa_faq1_a = "Sudáfrica es un destino abierto durante todo el año, pero el momento ideal depende de tus intereses. Para los safaris, los meses secos de invierno (mayo a septiembre) son los mejores. Para las vacaciones en la playa o la Ruta Jardín, los meses de verano (noviembre a marzo) son ideales."
dest_south_africa_faq2_q = "¿Necesito visado para visitar Sudáfrica?"
dest_south_africa_faq2_a = "Los requisitos de visado dependen de tu nacionalidad. Muchos países, incluidos los de la UE, EE. UU., Reino Unido y la SADC, disfrutan de entrada sin visado para estancias de hasta 90 días. Consulta con la embajada sudafricana más cercana antes de viajar."
dest_south_africa_faq3_q = "¿Qué moneda se utiliza y se puede pagar con tarjeta?"
dest_south_africa_faq3_a = "La moneda es el rand sudafricano (ZAR). Las tarjetas son ampliamente aceptadas en ciudades, hoteles y restaurantes. Es aconsejable llevar algo de efectivo para zonas rurales y mercados locales."
dest_south_africa_cta_title = "Planifica tu viaje por Sudáfrica"
dest_south_africa_cta_desc = "Safari, costa, viñedos o todo a la vez — crearemos el itinerario perfecto por Sudáfrica para ti."
dest_get_a_quote = "Obtener presupuesto"

; ── Destination: Angola ───────────────────────────────────────────────────
dest_angola_subtitle = "Un destino cautivador fuera de los circuitos habituales — paisajes impresionantes, cultura rica y fauna única."
dest_angola_overview = "Embárcate en una aventura en Angola y descubre paisajes impresionantes — desde las espectaculares cataratas de Kalandula hasta las hermosas costas de Benguela. Disfruta de un safari familiar en el Parque Nacional de Kissama, observa la fauna en su hábitat natural y explora joyas ocultas como la Fisura de Tundavala y las antiguas pinturas rupestres de Tchitundu-Hulu. Relájate en las tranquilas playas de Luanda y Namibe, o recorre el río Kwanza para admirar una diversa avifauna y paisajes pintorescos."
dest_angola_mustsee_title = "Imprescindibles en Angola"
dest_angola_mustsee_desc = "Descubre playas paradisíacas, parques nacionales y ciudades históricas."
dest_angola_place1_title = "Namibe"
dest_angola_place1_desc = "La provincia costera angoleña de Namibe ofrece playas impresionantes, paisajes desérticos y un rico patrimonio cultural. Los visitantes pueden explorar la histórica ciudad de Namibe, relajarse en playas vírgenes y descubrir la biodiversidad única de la región."
dest_angola_place2_title = "Parque Nacional de Kissama"
dest_angola_place2_desc = "Este vasto parque alberga elefantes, leones, jirafas y cebras. Los visitantes pueden ir de safari para observar estas majestuosas criaturas en su hábitat natural, o pasear por exuberantes bosques tropicales."
dest_angola_place3_title = "Cataratas de Kalandula"
dest_angola_place3_desc = "Estas espectaculares cataratas — las segundas más altas de África — son una verdadera maravilla natural. Admíralas desde lejos o sube por la senda hasta su base para una vista más cercana. Un espectáculo impresionante que no debes perderte."
dest_angola_place4_title = "Benguela"
dest_angola_place4_desc = "Esta histórica ciudad cuenta con edificios coloniales bien conservados, incluido el Fuerte de São Filipe de Benguela y la iglesia de Nossa Senhora do Pópulo. Relájate en playas de arena o explora los animados mercados de la ciudad."
dest_angola_place5_title = "Lobito"
dest_angola_place5_desc = "Esta ciudad costera es conocida por sus hermosas playas, aguas turquesas y ambiente relajado. Perfecta para nadar, tomar el sol, hacer surf o explorar las tiendas y restaurantes locales."
dest_angola_place6_title = "Parque Nacional de Luengue-Luiana"
dest_angola_place6_desc = "Ubicado en el sureste de Angola, este vasto parque abarca sabanas, bosques y humedales. Es hogar de una rica fauna que incluye elefantes, leones, leopardos y cocodrilos."
dest_angola_hidden_gem = "Joya oculta"
dest_angola_cta_title = "¿Listo para explorar Angola?"
dest_angola_cta_desc = "Déjanos crear un itinerario personalizado en Angola para ti. Solicita un presupuesto gratuito y nos pondremos en contacto en 24 horas."

; ── Destination: Zambia ───────────────────────────────────────────────────
dest_zambia_subtitle = "Salvaje, auténtica y sin prisas — Zambia es la gran frontera safari virgen del sur de África."
dest_zambia_overview = "Zambia es el secreto mejor guardado del sur de África — una tierra de parques nacionales salvajes y remotos, legendarios safaris a pie y las majestuosas cataratas Victoria compartidas con Zimbabwe. Desde el prístino valle de South Luangwa hasta el vasto Parque Nacional de Kafue, Zambia ofrece una experiencia safari íntima y poco masificada sin igual."
dest_zambia_highlight1 = "Cataratas Victoria (Mosi-oa-Tunya) — compartidas con Zimbabwe"
dest_zambia_highlight2 = "Parque Nacional de South Luangwa — uno de los mejores de África para safaris a pie"
dest_zambia_highlight3 = "Parque Nacional del Lower Zambezi — safaris en canoa por el Zambezi"
dest_zambia_highlight4 = "Parque Nacional de Kafue — uno de los parques más grandes del mundo"
dest_zambia_cta_title = "Explora Zambia con Namwel"
dest_zambia_cta_desc = "Zambia se combina frecuentemente con Zimbabwe y Botsuana para épicos itinerarios multipaís. Solicita un presupuesto y crearemos el viaje perfecto para ti."

; ── Destinations Index ────────────────────────────────────────────────────
dest_namibia_desc = "Dunas desérticas, cielos abiertos, abundante fauna y costas dramáticas. Namibia es uno de los últimos grandes espacios vírgenes del mundo — ideal tanto para safaris self-drive como guiados."
dest_namibia_highlight1 = "Sossusvlei y Parque Nacional de Etosha"
dest_namibia_highlight2 = "Skeleton Coast y Damaraland"
dest_botswana_desc = "El mejor destino safari de África — remoto, prístino y repleto de fauna. El delta del Okavango y el Parque Nacional de Chobe se encuentran entre las mayores maravillas naturales del mundo."
dest_botswana_highlight1 = "Delta del Okavango y Chobe NP"
dest_botswana_highlight2 = "Parque Transfronterizo de Kgalagadi"
dest_zimbabwe_desc = "Cataratas Victoria, ruinas antiguas, fauna extraordinaria y una cultura cálida. Zimbabwe es un destino en auge que ofrece experiencias de clase mundial sin aglomeraciones."
dest_zimbabwe_highlight1 = "Cataratas Victoria y Hwange NP"
dest_zimbabwe_highlight2 = "Matobo Hills y Mana Pools"
dest_south_africa_desc = "Un país de contrastes extraordinarios — fauna emblemática, viñedos de renombre mundial, costas dramáticas y la energía cosmopolita del Cabo y Johannesburgo."
dest_south_africa_highlight1 = "Kruger NP y Montaña de la Mesa"
dest_south_africa_highlight2 = "Ruta Jardín y Drakensberg"
dest_angola_desc = "Un destino cautivador fuera de los circuitos habituales — paisajes impresionantes, playas atlánticas, espectaculares cascadas y una rica cultura por descubrir."
dest_angola_highlight1 = "Cataratas de Kalandula y Kissama NP"
dest_angola_highlight2 = "Costa de Luanda, Benguela y Lobito"
dest_zambia_desc = "El secreto mejor guardado del sur de África — salvaje, auténtico y poco masificado. Famoso por los legendarios safaris a pie en South Luangwa y el lado zambiano de las cataratas Victoria."
dest_zambia_highlight1 = "South Luangwa y Lower Zambezi"
dest_zambia_highlight2 = "Cataratas Victoria y Kafue NP"
dest_plan_trip_desc = "Los mejores itinerarios por el sur de África combinan dos o tres países en un único viaje fluido. Namibia + Botsuana + Zimbabwe es nuestra combinación más popular — pero las posibilidades son infinitas. Cuéntanos tus intereses y diseñaremos una ruta a tu medida."
