about_intro_1 = "Namwel Tours and Car Rentals es una agencia namibia local especializada en viajes a medida y circuitos en grupos pequeños. Inspirados por los vastos paisajes de Namibia, creamos itinerarios que combinan relajación, encanto y cercanía con la naturaleza. Nuestro apasionado equipo te acompaña con profesionalismo para hacer de tu safari una experiencia única e inolvidable, donde cada detalle cuenta."
about_intro_2 = "Fundada en 2017, Namwel se construyó sobre una visión clara: ofrecer a los viajeros un servicio fiable que combine alquileres de coches premium con experiencias de viaje profundamente auténticas por Namibia y el sur de África. Desde el primer día, Namwel se ha posicionado como un socio de confianza para los viajeros locales e internacionales que desean explorar Namibia y el resto del sur de África a través de safaris, fauna, paisajes y patrimonio cultural."
about_vision_desc = "Compartir nuestro conocimiento y pasión por Namibia y el sur de África con todos los viajeros — individuos, familias y grupos — que buscan experiencias auténticas y memorables en esta extraordinaria región."
about_mission_desc = "Establecer asociaciones colaborativas con partes interesadas locales e internacionales para apoyar iniciativas de desarrollo comunitario en la región, mientras ofrecemos experiencias de viaje excepcionales."
about_values_desc = "Pasión por los viajes · Colaboración y alianzas · Apoyo a las comunidades · Sostenibilidad y responsabilidad medioambiental · Un enfoque centrado en el cliente en cada paso."
about_why_desc = "Nuestro compromiso con la satisfacción del cliente, la diversidad de opciones de viaje y nuestro enfoque orientado a la comunidad nos distinguen como operador turístico líder en Namibia. Aquí te mostramos por qué los viajeros confían en nosotros para aventuras inolvidables."
about_comm1_desc = "Nuestros circuitos incluyen visitas a proyectos de turismo comunitario como granjas tradicionales y pueblos culturales. Este enfoque permite a los viajeros descubrir la auténtica cultura namibia mientras se generan ingresos para las comunidades locales."
about_comm2_desc = "Namwel contribuye activamente a la creación de empleo local contratando guías turísticos, conductores y personal de apoyo de las comunidades namibias — ofreciendo oportunidades de ingresos sostenibles y fomentando el desarrollo de habilidades."
about_comm3_desc = "Priorizamos el abastecimiento de productos y servicios de proveedores locales — alojamientos, artesanos y vendedores de alimentos — ayudando a estimular la economía local y crear oportunidades sostenibles para las pequeñas y medianas empresas."
about_ceo_languages = "Experto en inglés, francés y portugués"
about_ceo_title = "Fundador y Director general"
about_ceo_desc = "Fernando aporta una gran experiencia a Namwel — habiendo trabajado como guía profesional, guía independiente y director de operaciones durante más de 23 años. Al fundar Namwel en 2017 con una profunda pasión por Namibia y el sur de África, ha construido un sólido equipo de guías profesionales dedicados a ofrecer experiencias de viaje de alta calidad e inolvidables."
about_drivers_desc = "Nuestros conductores profesionales garantizan viajes seguros y cómodos por Namibia. Con años de experiencia en terrenos variados, aseguran trayectos fluidos tanto para una aventura self-drive como para una excursión guiada. La seguridad, la fiabilidad y la satisfacción del cliente son sus prioridades."
about_guides_desc = "¡Nuestros experimentados guías turísticos dan vida a Namibia! Desde safaris de fauna hasta excursiones culturales, comparten su conocimiento experto e historias cautivadoras para una experiencia inmersiva e inolvidable. Amables, multilingües y conocedores — hacen que cada viaje sea extraordinario."
