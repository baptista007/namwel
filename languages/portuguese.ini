about_intro_1 = "Namwel Tours and Car Rentals is a local Namibian agency specialising in tailor-made journeys and small-group tours. Inspired by Namibia's vast landscapes, we create itineraries that combine relaxation, charm, and closeness to nature. Our passionate team accompanies you with professionalism to make your safari a unique and unforgettable experience, where every detail counts."
about_intro_2 = "Founded in 2017, Namwel was built on a clear vision: to offer travellers a reliable service combining premium car rentals with deeply authentic travel experiences across Namibia and Southern Africa. From day one, Namwel has positioned itself as a trusted partner for both local and international travellers wishing to explore Namibia and the rest of Southern Africa through safaris, wildlife, landscapes, and cultural heritage."
about_vision_desc = "To share our knowledge and passion for Namibia and Southern Africa with all travellers — individuals, families, and groups — seeking authentic and memorable experiences in this extraordinary region."
about_mission_desc = "To establish collaborative partnerships with local and international stakeholders to support community development initiatives across the region, while delivering exceptional travel experiences."
about_values_desc = "Passion for travel · Collaboration and partnerships · Community empowerment · Sustainability and environmental responsibility · A client-first approach at every step."
about_why_desc = "Our commitment to client satisfaction, diverse travel options, and community-driven approach set us apart as a leading tour operator in Namibia. Here's why travellers trust us for unforgettable adventures."
about_comm1_desc = "Our circuits include visits to community tourism projects such as traditional farms and cultural villages. This approach allows travellers to discover authentic Namibian culture while generating income for local communities."
about_comm2_desc = "Namwel actively contributes to local job creation by hiring tour guides, drivers, and support staff from Namibian communities — offering sustainable income opportunities and fostering skills development."
about_comm3_desc = "We prioritise sourcing products and services from local suppliers — accommodation providers, craftspeople, and food vendors — helping stimulate the local economy and create sustainable opportunities for small and medium businesses."
about_ceo_languages = "Expert in English, French, and Portuguese"
about_ceo_title = "Founder & Managing Director"
about_ceo_desc = "Fernando brings a wealth of experience to Namwel — having worked as a professional guide, independent guide, and operations director for over 23 years. Founding Namwel in 2017 with a deep passion for Namibia and Southern Africa, he has built a strong team of professional guides dedicated to delivering high-quality and unforgettable travel experiences."
about_drivers_desc = "Our professional drivers ensure safe and comfortable travel across Namibia. With years of experience on varied terrain, they guarantee smooth journeys whether for a self-drive adventure or a guided excursion. Safety, reliability, and client satisfaction are their priorities."
about_guides_desc = "Our experienced tour guides bring Namibia to life! From wildlife safaris to cultural excursions, they share expert knowledge and captivating stories for an immersive and unforgettable experience. Friendly, multilingual, and knowledgeable — they make every journey extraordinary."
