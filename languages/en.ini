home_pkg2_desc = "Embark on an exceptional journey through Southern Africa with our Fascinating Southern Africa tour , a comprehensive 17-day adventure linking three iconic countries: Namibia, Botswana, and Zimbabwe."
home_pkg3_location = "Namibia"
home_pkg3_title = "Namibian Great Outdoors"
home_pkg3_duration = "14 Days / 13 Nights"
home_pkg3_desc = "Embark on a 14-day adventure exploring Namibia's vast landscapes: Etosha National Park, Damaraland, the Skeleton Coast, the Namib Desert, and the Kalahari. Enjoy safaris, breathtaking scenery, and cultural immersion in the heart of Namibian nature. This guided tour is ideal for small groups seeking adventure and comfort."
