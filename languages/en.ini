dest_namibia_subtitle = "Deserts, dunes, and starry skies — an escape like no other on Earth."
dest_namibia_overview = "Set off on an adventure in Namibia to discover stunning landscapes — from the red dunes of the Namib Desert to the granite massifs of the Spitzkoppe and Brandberg. Enjoy a family safari in Etosha Park, watching wildlife gather at floodlit waterholes. Explore lesser-known places like Kaokoland and the Epupa Falls, or relax on a cruise discovering seals and dolphins in Swakopmund and Walvis Bay. Meet local cultures such as the Himba and the Bushmen for a truly unique travel experience."
dest_namibia_mustsee_title = "Must-See Places in Namibia"
dest_namibia_mustsee_desc = "Spectacular landscapes, remarkable wildlife, and unforgettable outdoor adventures."
dest_namibia_place1_title = "Etosha National Park"
dest_namibia_place1_desc = "One of Africa's most important game reserves in northern Namibia. Home to lions, elephants, rhinos, and hundreds of bird species — all gathering around the famous salt pan waterholes."
dest_namibia_place2_title = "Sossusvlei & Deadvlei"
dest_namibia_place2_desc = "The world's tallest sand dunes. Inside the Namib-Naukluft Park, Sossusvlei and Deadvlei are two of Namibia's most iconic landscapes — especially breathtaking at sunrise."
dest_namibia_place3_title = "Swakopmund & the Coast"
dest_namibia_place3_desc = "A charming coastal town with a German colonial character. Base yourself here for dune sandboarding, seal cruises, quad biking in the desert, and dolphin-watching in Walvis Bay."
dest_namibia_place4_title = "Fish River Canyon"
dest_namibia_place4_desc = "The second largest canyon in the world stretches over 160 km through the south of Namibia. Dramatic viewpoints, multi-day hiking trails, and a sense of utter solitude make it one of Africa's great wonders."
dest_namibia_place5_title = "Skeleton Coast"
dest_namibia_place5_desc = "One of the most remote and wild stretches of coastline in the world — shipwrecks, seal colonies, desert-adapted lions, and the relentless Atlantic. An adventure destination unlike any other."
dest_namibia_place6_title = "Damaraland & Okaokoland"
dest_namibia_place6_desc = "Remote, dramatic highland landscapes where you can find engravings, meet the Himba people, search for desert-adapted elephants and black rhinos in one of Namibia's most beautiful and wild regions."
dest_namibia_cta_title = "Plan Your Namibia Adventure"
dest_namibia_cta_desc = "From self-drive camping to luxury lodges, we know Namibia inside out. Get your personalised itinerary within 24 hours."

; ── Destination: Botswana ─────────────────────────────────────────────────
dest_botswana_subtitle = "Vast wild spaces, intimate safari camps, and wildlife encounters that rank among Africa's finest."
dest_botswana_overview = "Discover Botswana, a jewel of Southern Africa. Explore the Okavango Delta, home to incredible wildlife from lions to crocodiles. Experience the mystical atmosphere of the Moremi marshes and embark on a traditional mokoro safari. Don't miss Chobe National Park, renowned for its extraordinary elephant concentrations and magnificent landscapes. Botswana's holidays centre on safaris, often in remote and luxurious camps far from the crowds."
dest_botswana_mustsee_title = "Must-See Places in Botswana"
dest_botswana_mustsee_desc = "Spectacular landscapes, extraordinary wildlife, and outdoor adventures await."
dest_botswana_place1_title = "Chobe National Park"
dest_botswana_place1_desc = "Home to the highest wildlife concentrations in Southern Africa — with elephant populations of 50,000 to 70,000. An unmissable park for any safari enthusiast."
dest_botswana_place2_title = "Okavango Delta"
dest_botswana_place2_desc = "The magical, world-famous Okavango Delta is one of the absolute highlights of a Botswana trip — the largest inland delta on earth, where the Okavango River meets the Kalahari."
dest_botswana_place3_title = "Kgalagadi Transfrontier Park"
dest_botswana_place3_desc = "Considered one of Africa's best parks for observing big cats. The famous black-maned Kalahari lions are frequently spotted, alongside cheetahs and leopards."
dest_botswana_cta_title = "Plan Your Botswana Safari"
dest_botswana_cta_desc = "We specialise in Botswana safari planning — self-drive routes, fly-in camps, and multi-country combinations. Get your free quote today."

; ── Destination: Zimbabwe ─────────────────────────────────────────────────
dest_zimbabwe_subtitle = "Victoria Falls, ancient ruins, extraordinary wildlife, and an emerging adventure destination in the heart of Southern Africa."
dest_zimbabwe_overview = "Zimbabwe, nestled in the heart of Southern Africa, is a captivating destination inviting travellers in search of authentic adventures. The country boasts breathtaking scenery, rich and diverse wildlife, and exceptional cultural and historical sites. Beyond its natural wonders, Zimbabwe has a rich heritage — from the ruins of Great Zimbabwe to the San rock art, and the colonial cities of Bulawayo and Harare."
dest_zimbabwe_mustsee_title = "Must-See Places in Zimbabwe"
dest_zimbabwe_mustsee_desc = "Stunning scenery, extraordinary wildlife, and outdoor adventures await across this remarkable country."
dest_zimbabwe_place1_title = "Victoria Falls"
dest_zimbabwe_place1_desc = "Known as Mosi-oa-Tunya — \"the smoke that thunders\" — on the Zambezi River at the Zambia-Zimbabwe border. One of the seven natural wonders of the world and Africa's most iconic sight."
dest_zimbabwe_place2_title = "Hwange National Park"
dest_zimbabwe_place2_desc = "One of Africa's largest national parks and Zimbabwe's most popular safari destination. Spanning over 14,600 km², it is home to some of the highest elephant populations on the continent."
dest_zimbabwe_place3_title = "Matobo Hills"
dest_zimbabwe_place3_desc = "A UNESCO World Heritage Site with ancient San rock paintings, dramatic granite kopjes, and white rhino tracking. A profoundly spiritual and historically significant landscape."
dest_zimbabwe_place4_title = "Great Zimbabwe Ruins"
dest_zimbabwe_place4_desc = "The ancient stone city that gives the country its name. These remarkable 11th-century ruins are the largest stone structure in sub-Saharan Africa and a powerful symbol of pre-colonial civilisation."
dest_zimbabwe_place5_title = "Zambezi River & Lake Kariba"
dest_zimbabwe_place5_desc = "Sunset cruises on the Zambezi, tiger fishing on Lake Kariba, and houseboat safaris on one of the world's largest man-made lakes — a completely different side of Zimbabwe's wildlife."
dest_zimbabwe_place6_title = "Mana Pools National Park"
dest_zimbabwe_place6_desc = "A UNESCO World Heritage Site on the Zambezi floodplain — known for walking safaris with extraordinary close wildlife encounters. One of Africa's true wild gems, accessible May to October."
dest_zimbabwe_cta_title = "Plan Your Zimbabwe Adventure"
dest_zimbabwe_cta_desc = "Zimbabwe is often combined with Botswana or Zambia for an epic multi-country itinerary. Let us design your perfect trip."

; ── Destination: South Africa ─────────────────────────────────────────────
dest_south_africa_subtitle = "The rainbow nation — breathtaking landscapes, iconic wildlife, world-class wine, and vibrant culture."
dest_south_africa_overview = "South Africa, the rainbow nation nestled at the southern tip of the African continent, is a captivating kaleidoscope of wonders. From breathtaking landscapes and authentic cultural encounters to extraordinary wildlife and flora, South Africa promises an unforgettable journey for adventurous souls seeking unique experiences off the ordinary path."
dest_south_africa_mustsee_title = "Must-See Places in South Africa"
dest_south_africa_mustsee_desc = "Iconic landscapes, extraordinary wildlife, and world-class experiences."
dest_south_africa_place1_title = "Table Mountain"
dest_south_africa_place1_desc = "Cape Town's iconic flat-topped mountain overlooks one of the world's most beautiful cities. Take the cable car for panoramic views, or hike one of several trails to the summit."
dest_south_africa_place2_title = "Kruger National Park"
dest_south_africa_place2_desc = "One of Africa's largest national parks and a world-class safari destination, home to the Big Five — elephants, lions, leopards, rhinos, and buffalo."
dest_south_africa_place3_title = "The Garden Route"
dest_south_africa_place3_desc = "This scenic coastal drive along the south coast offers spectacular Indian Ocean views, charming towns, hiking, surfing, and wildlife encounters along the way."
dest_south_africa_place4_title = "Drakensberg Mountains"
dest_south_africa_place4_desc = "A UNESCO World Heritage Site renowned for spectacular cliffs, verdant valleys, and panoramic views. Exceptional hiking, ancient San rock art, and dramatic escarpments."
dest_south_africa_faq_title = "Frequently Asked Questions"
dest_south_africa_faq_subtitle = "Planning a trip to South Africa? Here are answers to the most common questions."
dest_south_africa_faq1_q = "What is the best time to visit South Africa?"
dest_south_africa_faq1_a = "South Africa is a year-round destination, but the ideal time depends on your interests. For safaris, the dry winter months (May to September) are best. For beach holidays or the Garden Route, the summer months (November to March) are ideal."
dest_south_africa_faq2_q = "Do I need a visa to visit South Africa?"
dest_south_africa_faq2_a = "Visa requirements depend on your nationality. Many countries including the EU, USA, UK, and SADC enjoy visa-free entry for stays up to 90 days. Check with your nearest South African embassy before travel."
dest_south_africa_faq3_q = "What currency is used, and can I pay by card?"
dest_south_africa_faq3_a = "The currency is the South African Rand (ZAR). Cards are widely accepted in cities, hotels, and restaurants. It's advisable to carry some cash for rural areas and local markets."
dest_south_africa_cta_title = "Plan Your South Africa Journey"
dest_south_africa_cta_desc = "Safari, coast, winelands, or all three — we'll craft the perfect South Africa itinerary for you."
dest_get_a_quote = "Get a Quote"

; ── Destination: Angola ───────────────────────────────────────────────────
dest_angola_subtitle = "A captivating destination off the beaten track — breathtaking landscapes, rich culture, and unique wildlife."
dest_angola_overview = "Set off on an adventure in Angola and discover stunning landscapes — from the spectacular Kalandula Falls to the beautiful coasts of Benguela. Enjoy a family safari in Quiçama National Park, observe wildlife in its natural habitat, and explore hidden gems such as the Tundavala Fissure and the ancient rock paintings of Tchitundu-Hulu. Relax on the serene beaches of Luanda and Namibe, or cruise the Kwanza River to admire diverse birdlife and picturesque scenery."
dest_angola_mustsee_title = "Must-See Places in Angola"
dest_angola_mustsee_desc = "Discover paradise beaches, national parks, and historic cities."
dest_angola_place1_title = "Namibe"
dest_angola_place1_desc = "Angola's coastal province of Namibe offers stunning beaches, desert landscapes, and rich cultural heritage. Visitors can explore the historic town of Namibe, relax on pristine beaches, and discover the unique biodiversity of the region."
dest_angola_place2_title = "Kissama National Park"
dest_angola_place2_desc = "This vast park is home to elephants, lions, giraffes, and zebras. Visitors can go on safari to observe these majestic creatures in their natural habitat, or walk through lush tropical forests."
dest_angola_place3_title = "Kalandula Falls"
dest_angola_place3_desc = "These spectacular falls — the second highest in Africa — are a true natural wonder. Admire them from afar or hike to the base for a closer view. A breathtaking spectacle not to be missed."
dest_angola_place4_title = "Benguela"
dest_angola_place4_desc = "This historic city features well-preserved colonial buildings including the Fort of São Filipe de Benguela and the church of Nossa Senhora do Pópulo. Relax on sandy beaches or explore the city's lively markets."
dest_angola_place5_title = "Lobito"
dest_angola_place5_desc = "This coastal city is known for beautiful beaches, turquoise waters, and a relaxed atmosphere. Perfect for swimming, sunbathing, surfing, or exploring local shops and restaurants."
dest_angola_place6_title = "Luengue-Luiana National Park"
dest_angola_place6_desc = "Located in southeastern Angola, this vast park spans savanna, forest, and wetlands. It is home to a rich wildlife including elephants, lions, leopards, and crocodiles."
dest_angola_hidden_gem = "Hidden Gem"
dest_angola_cta_title = "Ready to Explore Angola?"
dest_angola_cta_desc = "Let us craft a personalised Angola itinerary for you. Request a free quote and we'll be in touch within 24 hours."

; ── Destination: Zambia ───────────────────────────────────────────────────
dest_zambia_subtitle = "Wild, authentic, and unhurried — Zambia is Southern Africa's great untouched safari frontier."
dest_zambia_overview = "Zambia is Southern Africa's best-kept secret — a land of wild, remote national parks, legendary walking safaris, and the thundering Victoria Falls shared with Zimbabwe. From the pristine South Luangwa Valley to the vast Kafue National Park, Zambia offers an intimate, uncrowded safari experience second to none."
dest_zambia_highlight1 = "Victoria Falls (Mosi-oa-Tunya) — shared with Zimbabwe"
dest_zambia_highlight2 = "South Luangwa National Park — one of Africa's finest for walking safaris"
dest_zambia_highlight3 = "Lower Zambezi National Park — canoe safaris along the Zambezi"
dest_zambia_highlight4 = "Kafue National Park — one of the largest parks in the world"
