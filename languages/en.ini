pkgs_camping_destinations_desc = "Carefully chosen sites offering breathtaking scenery, unique wildlife encounters, and exceptional outdoor adventures."
pkgs_camping_place1_title = "Namutoni Rest Camp"
pkgs_camping_place1_desc = "A charming retreat inside Etosha National Park, built around a historic German fort. Offers comfortable accommodation, a restaurant, and a waterhole where visitors can watch animals at close range."
pkgs_camping_place2_title = "Halali Rest Camp"
pkgs_camping_place2_desc = "A peaceful retreat at the heart of Etosha, offering a serene atmosphere and excellent wildlife viewing. Its strategic location makes it an ideal base for exploring Etosha's varied landscapes and fauna."
pkgs_camping_place3_title = "Sossusvlei & Deadvlei"
pkgs_camping_place3_desc = "Marvel at the world's tallest dunes and the surreal white clay pan of Deadvlei at sunrise. Camping in the Namib-Naukluft is an unforgettable experience — silence, stars, and ancient red sand."
pkgs_camping_place4_title = "Wolwedans Boulders"
pkgs_camping_place4_desc = "A 7-day wilderness safari deep in the NamibRand Nature Reserve — one of Namibia's most protected desert landscapes. Intimate, immersive, and extraordinary."
pkgs_camping_place5_title = "Okavango Delta & Chobe"
pkgs_camping_place5_desc = "Cross into Botswana for world-class game viewing. Camping along the Chobe River and deep in the Okavango Delta offers some of the most dramatic wildlife encounters on the continent."
pkgs_camping_place6_title = "Skeleton Coast & Damaraland"
pkgs_camping_place6_desc = "Remote, dramatic, and utterly wild. The Skeleton Coast and Damaraland offer desert-adapted elephants, ancient rock engravings at Twyfelfontein, and a coastline unlike anywhere else on earth."
pkgs_camping_itineraries_title = "Sample Camping Itineraries"
pkgs_camping_itineraries_desc = "All itineraries are fully customisable — mix campsites and lodge nights to match your style."
pkgs_camping_itin1_title = "5-Day Etosha Camping Safari"
pkgs_camping_itin1_desc = "An immersive wildlife experience in one of Africa's premier game reserves — game drives, waterholes, and nights under the stars inside Etosha National Park."
pkgs_camping_itin2_title = "4-Day Sossusvlei Camping Safari"
pkgs_camping_itin2_desc = "Marvel at the stunning scenery of Sossusvlei — towering red dunes, surreal Deadvlei, and the unique desert landscapes of the Namib-Naukluft Park."
pkgs_camping_itin3_title = "7-Day Wolwedans Wilderness Safari"
pkgs_camping_itin3_desc = "Immerse yourself in the heart of the NamibRand Nature Reserve — one of the most pristine and preserved desert landscapes in Namibia."
