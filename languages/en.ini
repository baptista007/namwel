pkgs_camping_section_title = "What to Expect on a Camping Safari"
pkgs_camping_intro_1 = "For lovers of nature and wide open spaces, camping safari is the ideal option for getting closer to Namibia's stunning natural wonders. The word safari means <strong>\"journey\"</strong> — and with Namwel, safari brings you back to a personal connection with Nature. Camping safaris offer an intimate experience: private transport, candlelit dinners under the stars, picnics in remote landscapes, and surprises at every turn."
pkgs_camping_intro_2 = "Choose between guided tours or self-drive camping circuits. We can arrange four- and five-star lodge nights alongside campsites, giving you the best of both worlds — adventure by day, comfort by night."
