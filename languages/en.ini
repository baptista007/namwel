home_pkg1_desc = "This 14-day tour takes you to the heart of Southern Africa, a region of exceptional natural and cultural richness. From Namibia, with its spectacular dunes and abundant wildlife, to Botswana and its famous national parks, and finally to the majestic Victoria Falls in Zimbabwe, each stop offers an immersion in unique landscapes and authentic traditions."
