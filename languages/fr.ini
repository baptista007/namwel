quote_additional_placeholder = "Parlez-nous de votre voyage de rêve, des endroits spécifiques que vous souhaitez visiter, de vos exigences alimentaires ou de toute question que vous avez..."
quote_faq1_q = "Combien de temps faut-il pour recevoir un devis ?"
quote_faq1_a = "Nous nous efforçons de fournir tous les devis dans les 24 heures. En haute saison, cela peut prendre jusqu'à 48 heures. Pour les itinéraires multi-destinations complexes, il nous faut parfois un peu plus de temps afin de vous proposer les meilleures options."
quote_faq2_q = "Qu'est-ce qui est inclus dans le devis ?"
quote_faq2_a = "Chaque devis comprend un itinéraire détaillé jour par jour, des options d'hébergement avec photos, toutes les activités et les transferts, les repas selon les spécifications, les services de guide expert et le prix total avec détail. Nous sommes fiers d'une tarification transparente sans frais cachés."
quote_faq3_q = "Puis-je modifier mon devis après l'avoir reçu ?"
quote_faq3_a = "Absolument ! Nous comprenons que les plans peuvent changer. Vous pouvez demander des modifications à votre itinéraire, vos choix d'hébergement ou vos dates de voyage à tout moment. Nous travaillerons avec vous pour trouver la solution idéale."
quote_faq4_q = "Quelle est la meilleure période pour visiter la Namibie ?"
quote_faq4_a = "La Namibie est une destination ouverte toute l'année. La meilleure période pour observer la faune est de mai à octobre, lorsque les animaux se rassemblent autour des points d'eau. Pour les célèbres dunes de Sossusvlei, chaque saison offre des panoramas spectaculaires. Notre équipe peut vous conseiller sur le meilleur moment selon vos centres d'intérêt."
