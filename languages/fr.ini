; ── Packages: Camping & Overland ─────────────────────────────────────────
pkgs_camping_page_title = "Camping & Overland"
pkgs_camping_page_subtitle = "Pour les voyageurs qui aiment la route — circuits 4x4 de camping, parcs nationaux et boucles multi-pays."
pkgs_camping_section_title = "À quoi s'attendre lors d'un safari camping"
pkgs_camping_intro_1 = "Pour les amoureux de la nature et des grands espaces, le safari camping est l'option idéale pour se rapprocher des merveilles naturelles époustouflantes de Namibie. Le mot safari signifie <strong>\"voyage\"</strong> — et avec Namwel, le safari vous reconnecte personnellement à la Nature. Les safaris camping offrent une expérience intime : transport privé, dîners aux chandelles sous les étoiles, pique-niques dans des paysages reculés, et des surprises à chaque étape."
pkgs_camping_intro_2 = "Choisissez entre les circuits guidés ou les circuits de camping en self-drive. Nous pouvons organiser des nuits en lodge quatre et cinq étoiles aux côtés des campings, vous offrant le meilleur des deux mondes — aventure le jour, confort la nuit."
pkgs_camping_feat1_title = "4x4 & Self-Drive"
pkgs_camping_feat1_sub = "Guidé ou indépendant"
pkgs_camping_feat2_title = "Camps étoilés"
pkgs_camping_feat2_sub = "Zéro pollution lumineuse"
pkgs_camping_feat3_title = "Location de matériel"
pkgs_camping_feat3_sub = "Kit complet disponible"
pkgs_camping_feat4_title = "Dîners en brousse"
pkgs_camping_feat4_sub = "Aux chandelles & en privé"
pkgs_camping_destinations_title = "Destinations camping sélectionnées"
pkgs_camping_destinations_desc = "Des sites soigneusement choisis offrant des panoramas à couper le souffle, des rencontres animalières uniques et des aventures en plein air exceptionnelles."
pkgs_camping_place1_title = "Namutoni Rest Camp"
pkgs_camping_place1_desc = "Un charmant refuge au cœur du parc national d'Etosha, construit autour d'un fort allemand historique. Propose un hébergement confortable, un restaurant et un point d'eau où les visiteurs peuvent observer les animaux à courte distance."
pkgs_camping_place2_title = "Halali Rest Camp"
pkgs_camping_place2_desc = "Un refuge paisible au cœur d'Etosha, offrant une atmosphère sereine et une excellente observation de la faune. Sa situation stratégique en fait une base idéale pour explorer les paysages variés et la faune d'Etosha."
pkgs_camping_place3_title = "Sossusvlei & Deadvlei"
pkgs_camping_place3_desc = "Émerveillez-vous devant les plus hautes dunes du monde et le pan d'argile blanc surréaliste de Deadvlei au lever du soleil. Le camping dans le Namib-Naukluft est une expérience inoubliable — silence, étoiles et sable rouge millénaire."
pkgs_camping_place4_title = "Wolwedans Boulders"
pkgs_camping_place4_desc = "Un safari de 7 jours en milieu sauvage au cœur de la réserve naturelle NamibRand — l'un des paysages désertiques les mieux protégés de Namibie. Intime, immersif et extraordinaire."
pkgs_camping_place5_title = "Delta de l'Okavango & Chobe"
pkgs_camping_place5_desc = "Passez au Botswana pour une observation animalière de classe mondiale. Le camping le long de la rivière Chobe et au cœur du delta de l'Okavango offre certaines des rencontres animalières les plus spectaculaires du continent."
pkgs_camping_place6_title = "Skeleton Coast & Damaraland"
pkgs_camping_place6_desc = "Reculé, spectaculaire et totalement sauvage. La Skeleton Coast et le Damaraland offrent des éléphants adaptés au désert, d'anciennes gravures rupestres à Twyfelfontein et un littoral comme nulle part ailleurs sur terre."
pkgs_camping_itineraries_title = "Exemples d'itinéraires camping"
pkgs_camping_itineraries_desc = "Tous les itinéraires sont entièrement personnalisables — mélangez campings et nuits en lodge selon votre style."
pkgs_camping_itin1_title = "Safari camping à Etosha de 5 jours"
pkgs_camping_itin1_desc = "Une expérience animalière immersive dans l'une des premières réserves d'Afrique — jeux de piste, points d'eau et nuits sous les étoiles au cœur du parc national d'Etosha."
pkgs_camping_itin2_title = "Safari camping à Sossusvlei de 4 jours"
pkgs_camping_itin2_desc = "Émerveillez-vous devant les panoramas époustouflants de Sossusvlei — hautes dunes rouges, Deadvlei surréaliste et paysages désertiques uniques du parc Namib-Naukluft."
pkgs_camping_itin3_title = "Safari de randonnée à Wolwedans de 7 jours"
pkgs_camping_itin3_desc = "Plongez au cœur de la réserve naturelle NamibRand — l'un des paysages désertiques les plus vierges et préservés de Namibie."
pkgs_view_itinerary = "Voir l'itinéraire"
pkgs_camping_good_know_1 = "Nous conseillons sur la praticabilité des itinéraires en fonction de la saison, de l'expérience de conduite et du choix du véhicule."
pkgs_camping_good_know_2 = "Nous pouvons organiser la location de matériel de camping, la préparation des véhicules et suggérer des étapes d'approvisionnement."
pkgs_camping_good_know_3 = "Certains parcs ont des exigences d'accès strictes — nous vous aidons avec les permis, les pré-réservations et les horaires."
pkgs_camping_good_know_4 = "La sécurité et le confort comptent — nous pouvons mélanger camping et nuits en lodge selon votre style et votre budget."

