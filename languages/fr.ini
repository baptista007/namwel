home_pkg1_location = "Botswana / Namibie / Zambie"
home_pkg1_title = "Le trésor de l'Afrique australe"
home_pkg1_duration = "15 jours / 14 nuits"
home_pkg1_desc = "Ce circuit de 14 jours vous emmène au cœur de l'Afrique australe, une région d'une richesse naturelle et culturelle exceptionnelle. De la Namibie, avec ses dunes spectaculaires et sa faune abondante, au Botswana et ses célèbres parcs nationaux, jusqu'aux majestueuses chutes Victoria au Zimbabwe, chaque étape offre une immersion dans des paysages uniques et des traditions authentiques."
home_pkg2_location = "Botswana / Namibie / Zimbabwe"
home_pkg2_title = "L'Afrique australe fascinante"
home_pkg2_duration = "17 jours / 16 nuits"
home_pkg2_desc = "Partez pour un voyage exceptionnel à travers l'Afrique australe avec notre circuit L'Afrique australe fascinante, une aventure complète de 17 jours reliant trois pays iconiques : la Namibie, le Botswana et le Zimbabwe."
home_pkg3_location = "Namibie"
home_pkg3_title = "Les grands espaces namibiens"
home_pkg3_duration = "14 jours / 13 nuits"
home_pkg3_desc = "Partez pour une aventure de 14 jours à la découverte des vastes paysages namibiens : le parc national d'Etosha, le Damaraland, la Skeleton Coast, le désert du Namib et le Kalahari. Profitez de safaris, de panoramas à couper le souffle et d'une immersion culturelle au cœur de la nature namibienne. Ce circuit guidé est idéal pour les petits groupes en quête d'aventure et de confort."
home_pkg4_location = "Namibie"
home_pkg4_title = "Une balade autour de l'Okavango"
home_pkg4_duration = "7 jours / 6 nuits"
home_pkg4_desc = "Le voyage au cœur du delta de l'Okavango est une expérience safari immersive à travers la Namibie, le Botswana et le Zimbabwe, offrant un équilibre parfait entre faune sauvage, paysages fluviaux et merveilles naturelles emblématiques."
