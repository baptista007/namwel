about_intro_1 = "Namwel Tours and Car Rentals est une agence namibienne locale spécialisée dans les voyages sur mesure et les circuits en petits groupes. Inspirés par les vastes paysages de Namibie, nous créons des itinéraires alliant détente, charme et proximité avec la nature. Notre équipe passionnée vous accompagne avec professionnalisme pour faire de votre safari une expérience unique et inoubliable, où chaque détail compte."
about_intro_2 = "Fondée en 2017, Namwel s'est construite sur une vision claire : offrir aux voyageurs un service fiable combinant des locations de voitures haut de gamme avec des expériences de voyage profondément authentiques à travers la Namibie et l'Afrique australe. Dès le premier jour, Namwel s'est positionnée comme un partenaire de confiance pour les voyageurs locaux et internationaux souhaitant explorer la Namibie et le reste de l'Afrique australe à travers les safaris, la faune, les paysages et le patrimoine culturel."
about_vision_desc = "Partager notre connaissance et notre passion pour la Namibie et l'Afrique australe avec tous les voyageurs — individuels, familles et groupes — en quête d'expériences authentiques et mémorables dans cette région extraordinaire."
about_mission_desc = "Établir des partenariats collaboratifs avec les parties prenantes locales et internationales pour soutenir les initiatives de développement communautaire dans la région, tout en offrant des expériences de voyage d'exception."
about_values_desc = "Passion du voyage · Collaboration et partenariats · Soutien aux communautés · Durabilité et responsabilité environnementale · Une approche centrée sur le client à chaque étape."
about_why_desc = "Notre engagement envers la satisfaction des clients, la diversité des options de voyage et notre approche axée sur les communautés nous distinguent en tant qu'opérateur touristique de référence en Namibie. Voici pourquoi les voyageurs nous font confiance pour des aventures inoubliables."
about_comm1_desc = "Nos circuits incluent des visites de projets de tourisme communautaire tels que des fermes traditionnelles et des villages culturels. Cette approche permet aux voyageurs de découvrir la culture namibienne authentique tout en générant des revenus pour les communautés locales."
about_comm2_desc = "Namwel contribue activement à la création d'emplois locaux en recrutant des guides touristiques, des chauffeurs et du personnel de soutien issus des communautés namibiennes — offrant des opportunités de revenus durables et favorisant le développement des compétences."
about_comm3_desc = "Nous privilégions l'approvisionnement en produits et services auprès de fournisseurs locaux — hébergements, artisans et vendeurs alimentaires — contribuant à stimuler l'économie locale et à créer des opportunités durables pour les petites et moyennes entreprises."
about_ceo_languages = "Expert en anglais, français et portugais"
about_ceo_title = "Fondateur & Directeur général"
about_ceo_desc = "Fernando apporte une riche expérience à Namwel — ayant exercé comme guide professionnel, guide indépendant et directeur des opérations pendant plus de 23 ans. En fondant Namwel en 2017 avec une profonde passion pour la Namibie et l'Afrique australe, il a constitué une solide équipe de guides professionnels dédiés à offrir des expériences de voyage de haute qualité et inoubliables."
about_drivers_desc = "Nos chauffeurs professionnels garantissent des déplacements sûrs et confortables à travers la Namibie. Forts de nombreuses années d'expérience sur des terrains variés, ils assurent des trajets fluides, que ce soit pour une aventure self-drive ou une excursion guidée. La sécurité, la fiabilité et la satisfaction des clients sont leurs priorités."
about_guides_desc = "Nos guides touristiques expérimentés donnent vie à la Namibie ! Des safaris animaliers aux excursions culturelles, ils partagent leur expertise et des récits captivants pour une expérience immersive et inoubliable. Accueillants, multilingues et compétents — ils rendent chaque voyage extraordinaire."
