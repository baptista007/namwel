; ── Packages: Honeymoon ───────────────────────────────────────────────────
pkgs_honeymoon_page_title = "Forfaits lune de miel"
pkgs_honeymoon_page_subtitle = "Romantique, privé et sans tracas — conçu autour du confort, des paysages et des expériences mémorables à deux."
pkgs_honeymoon_section_title = "Votre lune de miel avec Namwel"
pkgs_honeymoon_intro_1 = "Avec Namwel Tours, votre lune de miel offre intimité et attentions particulières telles que des safaris en transport privé, des pique-niques ou des dîners aux chandelles, et bien d'autres surprises. Les séjours romantiques en Namibie vous permettent de vivre l'isolement d'une retraite de luxe privée — rien que vous et votre partenaire, avec un guide privé à votre disposition."
pkgs_honeymoon_intro_2 = "Namwel vous offrira relaxation dans des hôtels ou maisons d'hôtes intimes de quatre et cinq étoiles, avec la possibilité d'admirer un coucher de soleil depuis votre terrasse privée ou de siroter un café au lit pendant que les animaux boivent à un point d'eau à quelques mètres de là."
