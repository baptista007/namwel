pkgs_honeymoon_stars_feat2 = "Rythme adapté à la photographie"
pkgs_honeymoon_stars_feat3 = "Séance d'observation du ciel nocturne"
pkgs_honeymoon_good_know_1 = "Dites-nous votre ambiance préférée : aventureuse, luxueuse, paisible ou un mélange des trois."
