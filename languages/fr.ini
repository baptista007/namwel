; ── Destination: Namibia ──────────────────────────────────────────────────
dest_namibia_subtitle = "Déserts, dunes et ciel étoilé — une évasion comme nulle part ailleurs sur Terre."
dest_namibia_overview = "Partez à l'aventure en Namibie pour découvrir des paysages époustouflants — des dunes rouges du désert du Namib aux massifs de granit de la Spitzkoppe et du Brandberg. Profitez d'un safari en famille dans le parc d'Etosha, en observant la faune se rassembler aux points d'eau éclairés. Explorez des endroits moins connus comme le Kaokoland et les chutes d'Epupa, ou détendez-vous lors d'une croisière à la découverte des phoques et des dauphins à Swakopmund et Walvis Bay. Rencontrez les cultures locales telles que les Himba et les Bushmen pour une expérience de voyage véritablement unique."
dest_namibia_mustsee_title = "Incontournables en Namibie"
dest_namibia_mustsee_desc = "Paysages spectaculaires, faune remarquable et aventures en plein air inoubliables."
dest_namibia_place1_title = "Parc national d'Etosha"
dest_namibia_place1_desc = "L'une des réserves naturelles les plus importantes d'Afrique, dans le nord de la Namibie. On y trouve des lions, des éléphants, des rhinocéros et des centaines d'espèces d'oiseaux — tous se rassemblant autour des célèbres points d'eau du pan salé."
dest_namibia_place2_title = "Sossusvlei & Deadvlei"
dest_namibia_place2_desc = "Les plus hautes dunes de sable du monde. Au cœur du parc Namib-Naukluft, Sossusvlei et Deadvlei sont deux des paysages les plus emblématiques de Namibie — particulièrement à couper le souffle au lever du soleil."
dest_namibia_place3_title = "Swakopmund & la côte"
dest_namibia_place3_desc = "Une charmante ville côtière au caractère colonial allemand. Prenez-la comme base pour le surf des dunes, les croisières aux phoques, le quad dans le désert et l'observation des dauphins à Walvis Bay."
dest_namibia_place4_title = "Fish River Canyon"
dest_namibia_place4_desc = "Le deuxième plus grand canyon du monde s'étend sur plus de 160 km dans le sud de la Namibie. Des points de vue dramatiques, des randonnées sur plusieurs jours et un sentiment de solitude absolue en font l'une des grandes merveilles d'Afrique."
dest_namibia_place5_title = "Skeleton Coast"
dest_namibia_place5_desc = "L'un des tronçons de côte les plus reculés et sauvages du monde — épaves, colonies de phoques, lions adaptés au désert et l'Atlantique implacable. Une destination d'aventure comme nulle autre."
dest_namibia_place6_title = "Damaraland & Okaokoland"
dest_namibia_place6_desc = "Des paysages de hautes terres reculés et dramatiques où vous pouvez trouver des gravures rupestres, rencontrer le peuple Himba et chercher des éléphants et des rhinocéros noirs adaptés au désert dans l'une des régions les plus belles et sauvages de Namibie."
dest_namibia_cta_title = "Planifiez votre aventure en Namibie"
dest_namibia_cta_desc = "Du camping en self-drive aux lodges de luxe, nous connaissons la Namibie sur le bout des doigts. Obtenez votre itinéraire personnalisé en 24 heures."

; ── Destination: Botswana ─────────────────────────────────────────────────
dest_botswana_subtitle = "Vastes espaces sauvages, camps safari intimes et rencontres animalières parmi les plus belles d'Afrique."
dest_botswana_overview = "Découvrez le Botswana, joyau de l'Afrique australe. Explorez le delta de l'Okavango, qui abrite une faune incroyable, des lions aux crocodiles. Vivez l'atmosphère mystique des marais du Moremi et partez en safari traditionnel en mokoro. Ne manquez pas le parc national de Chobe, réputé pour ses extraordinaires concentrations d'éléphants et ses magnifiques paysages. Les vacances au Botswana se déroulent autour des safaris, souvent dans des camps reculés et luxueux, loin de la foule."
dest_botswana_mustsee_title = "Incontournables au Botswana"
dest_botswana_mustsee_desc = "Des paysages spectaculaires, une faune extraordinaire et des aventures en plein air vous attendent."
dest_botswana_place1_title = "Parc national de Chobe"
dest_botswana_place1_desc = "Abritant les plus fortes concentrations de faune sauvage d'Afrique australe — avec des populations d'éléphants allant de 50 000 à 70 000. Un parc incontournable pour tout passionné de safari."
dest_botswana_place2_title = "Delta de l'Okavango"
dest_botswana_place2_desc = "Le magnifique et mondialement célèbre delta de l'Okavango est l'un des temps forts absolus d'un voyage au Botswana — le plus grand delta intérieur de la Terre, là où la rivière Okavango rencontre le Kalahari."
dest_botswana_place3_title = "Parc transfrontalier de Kgalagadi"
dest_botswana_place3_desc = "Considéré comme l'un des meilleurs parcs d'Afrique pour observer les grands félins. Les fameux lions à crinière noire du Kalahari y sont fréquemment aperçus, aux côtés des guépards et des léopards."
dest_botswana_cta_title = "Planifiez votre safari au Botswana"
dest_botswana_cta_desc = "Nous sommes spécialisés dans la planification de safaris au Botswana — itinéraires self-drive, camps en avion et combinaisons multi-pays. Demandez votre devis gratuit dès aujourd'hui."

; ── Destination: Zimbabwe ─────────────────────────────────────────────────
dest_zimbabwe_subtitle = "Victoria Falls, ruines antiques, faune extraordinaire et destination d'aventure en plein essor au cœur de l'Afrique australe."
dest_zimbabwe_overview = "Le Zimbabwe, niché au cœur de l'Afrique australe, est une destination captivante qui invite les voyageurs en quête d'aventures authentiques. Le pays offre des paysages à couper le souffle, une faune riche et diversifiée, ainsi que des sites culturels et historiques exceptionnels. Au-delà de ses merveilles naturelles, le Zimbabwe possède un riche patrimoine — des ruines de Great Zimbabwe à l'art rupestre San, en passant par les villes coloniales de Bulawayo et Harare."
dest_zimbabwe_mustsee_title = "Incontournables au Zimbabwe"
dest_zimbabwe_mustsee_desc = "Des panoramas époustouflants, une faune extraordinaire et des aventures en plein air vous attendent dans ce pays remarquable."
dest_zimbabwe_place1_title = "Victoria Falls"
dest_zimbabwe_place1_desc = "Connues sous le nom de Mosi-oa-Tunya — \"la fumée qui gronde\" — sur le fleuve Zambezi, à la frontière entre la Zambie et le Zimbabwe. L'une des sept merveilles naturelles du monde et le site le plus emblématique d'Afrique."
dest_zimbabwe_place2_title = "Parc national de Hwange"
dest_zimbabwe_place2_desc = "L'un des plus grands parcs nationaux d'Afrique et la destination safari la plus prisée du Zimbabwe. S'étendant sur plus de 14 600 km², il abrite certaines des plus importantes populations d'éléphants du continent."
dest_zimbabwe_place3_title = "Matobo Hills"
dest_zimbabwe_place3_desc = "Un site classé au patrimoine mondial de l'UNESCO avec d'anciennes peintures rupestres San, des kopjes de granit spectaculaires et le pistage du rhinocéros blanc. Un paysage profondément spirituel et historiquement significatif."
dest_zimbabwe_place4_title = "Ruines du Great Zimbabwe"
dest_zimbabwe_place4_desc = "L'ancienne cité de pierre qui donne son nom au pays. Ces remarquables ruines du XIe siècle constituent la plus grande structure en pierre d'Afrique subsaharienne et un puissant symbole de la civilisation précoloniale."
dest_zimbabwe_place5_title = "Fleuve Zambezi & lac Kariba"
dest_zimbabwe_place5_desc = "Croisières au coucher du soleil sur le Zambezi, pêche au tigre sur le lac Kariba et safaris en bateau-maison sur l'un des plus grands lacs artificiels du monde — un côté du Zimbabwe totalement différent."
dest_zimbabwe_place6_title = "Parc national de Mana Pools"
dest_zimbabwe_place6_desc = "Un site classé au patrimoine mondial de l'UNESCO sur la plaine inondable du Zambezi — réputé pour ses safaris à pied avec des rencontres animalières d'une proximité extraordinaire. L'un des véritables joyaux sauvages d'Afrique, accessible de mai à octobre."
dest_zimbabwe_cta_title = "Planifiez votre aventure au Zimbabwe"
dest_zimbabwe_cta_desc = "Le Zimbabwe est souvent combiné avec le Botswana ou la Zambie pour un itinéraire multi-pays épique. Laissez-nous concevoir votre voyage parfait."

; ── Destination: South Africa ─────────────────────────────────────────────
dest_south_africa_subtitle = "La nation arc-en-ciel — paysages à couper le souffle, faune emblématique, vignobles de renommée mondiale et culture vibrante."
dest_south_africa_overview = "L'Afrique du Sud, la nation arc-en-ciel nichée à la pointe méridionale du continent africain, est un kaléidoscope captivant de merveilles. Des paysages à couper le souffle et des rencontres culturelles authentiques à la faune et à la flore extraordinaires, l'Afrique du Sud promet un voyage inoubliable aux âmes aventureuses en quête d'expériences uniques hors des sentiers battus."
dest_south_africa_mustsee_title = "Incontournables en Afrique du Sud"
dest_south_africa_mustsee_desc = "Paysages emblématiques, faune extraordinaire et expériences de classe mondiale."
dest_south_africa_place1_title = "Montagne de la Table"
dest_south_africa_place1_desc = "La montagne à sommet plat emblématique du Cap surplombe l'une des plus belles villes du monde. Prenez le téléphérique pour des vues panoramiques, ou empruntez l'un des nombreux sentiers jusqu'au sommet."
dest_south_africa_place2_title = "Parc national Kruger"
dest_south_africa_place2_desc = "L'un des plus grands parcs nationaux d'Afrique et une destination safari de classe mondiale, qui abrite les Big Five — éléphants, lions, léopards, rhinocéros et buffles."
dest_south_africa_place3_title = "La Route des Jardins"
dest_south_africa_place3_desc = "Ce pittoresque parcours côtier longeant la côte sud offre des vues spectaculaires sur l'océan Indien, des villes charmantes, des randonnées, du surf et des rencontres avec la faune en chemin."
dest_south_africa_place4_title = "Monts Drakensberg"
dest_south_africa_place4_desc = "Un site classé au patrimoine mondial de l'UNESCO réputé pour ses falaises spectaculaires, ses vallées verdoyantes et ses vues panoramiques. Randonnées d'exception, art rupestre San ancien et escarpements dramatiques."
dest_south_africa_faq_title = "Questions fréquemment posées"
dest_south_africa_faq_subtitle = "Vous planifiez un voyage en Afrique du Sud ? Voici les réponses aux questions les plus courantes."
dest_south_africa_faq1_q = "Quelle est la meilleure période pour visiter l'Afrique du Sud ?"
dest_south_africa_faq1_a = "L'Afrique du Sud est une destination ouverte toute l'année, mais la période idéale dépend de vos centres d'intérêt. Pour les safaris, les mois d'hiver secs (mai à septembre) sont les meilleurs. Pour les vacances à la plage ou la Route des Jardins, les mois d'été (novembre à mars) sont idéaux."
dest_south_africa_faq2_q = "Ai-je besoin d'un visa pour visiter l'Afrique du Sud ?"
dest_south_africa_faq2_a = "Les conditions d'obtention d'un visa dépendent de votre nationalité. De nombreux pays, dont ceux de l'UE, les États-Unis, le Royaume-Uni et les pays de la SADC, bénéficient d'une entrée sans visa pour des séjours jusqu'à 90 jours. Renseignez-vous auprès de l'ambassade d'Afrique du Sud la plus proche avant de voyager."
dest_south_africa_faq3_q = "Quelle monnaie est utilisée et peut-on payer par carte ?"
dest_south_africa_faq3_a = "La monnaie est le rand sud-africain (ZAR). Les cartes bancaires sont largement acceptées dans les villes, les hôtels et les restaurants. Il est conseillé d'avoir un peu d'argent liquide pour les zones rurales et les marchés locaux."
dest_south_africa_cta_title = "Planifiez votre voyage en Afrique du Sud"
dest_south_africa_cta_desc = "Safari, côte, vignobles ou les trois — nous créerons l'itinéraire parfait en Afrique du Sud pour vous."
dest_get_a_quote = "Obtenir un devis"

; ── Destination: Angola ───────────────────────────────────────────────────
dest_angola_subtitle = "Une destination captivante hors des sentiers battus — paysages à couper le souffle, culture riche et faune unique."
dest_angola_overview = "Partez à l'aventure en Angola et découvrez des paysages époustouflants — des spectaculaires chutes de Kalandula aux belles côtes de Benguela. Profitez d'un safari en famille dans le parc national de Kissama, observez la faune dans son habitat naturel et explorez des joyaux cachés comme la fissure de Tundavala et les anciennes peintures rupestres de Tchitundu-Hulu. Détendez-vous sur les plages sereines de Luanda et Namibe, ou remontez la rivière Kwanza pour admirer une avifaune diversifiée et des panoramas pittoresques."
dest_angola_mustsee_title = "Incontournables en Angola"
dest_angola_mustsee_desc = "Découvrez des plages paradisiaques, des parcs nationaux et des villes historiques."
dest_angola_place1_title = "Namibe"
dest_angola_place1_desc = "La province côtière de Namibe en Angola offre de superbes plages, des paysages désertiques et un riche patrimoine culturel. Les visiteurs peuvent explorer la ville historique de Namibe, se détendre sur des plages immaculées et découvrir la biodiversité unique de la région."
dest_angola_place2_title = "Parc national de Kissama"
dest_angola_place2_desc = "Ce vaste parc abrite des éléphants, des lions, des girafes et des zèbres. Les visiteurs peuvent partir en safari pour observer ces créatures majestueuses dans leur habitat naturel, ou se promener dans de luxuriantes forêts tropicales."
dest_angola_place3_title = "Chutes de Kalandula"
dest_angola_place3_desc = "Ces chutes spectaculaires — les deuxièmes plus hautes d'Afrique — sont une véritable merveille naturelle. Admirez-les de loin ou randonnez jusqu'à leur pied pour les voir de plus près. Un spectacle à couper le souffle à ne pas manquer."
dest_angola_place4_title = "Benguela"
dest_angola_place4_desc = "Cette ville historique abrite des bâtiments coloniaux bien conservés, notamment le fort de São Filipe de Benguela et l'église Nossa Senhora do Pópulo. Détendez-vous sur des plages de sable ou explorez les marchés animés de la ville."
dest_angola_place5_title = "Lobito"
dest_angola_place5_desc = "Cette ville côtière est connue pour ses belles plages, ses eaux turquoise et son atmosphère détendue. Idéale pour nager, bronzer, surfer ou explorer les boutiques et restaurants locaux."
dest_angola_place6_title = "Parc national de Luengue-Luiana"
dest_angola_place6_desc = "Situé dans le sud-est de l'Angola, ce vaste parc s'étend sur des savanes, des forêts et des zones humides. Il abrite une faune riche comprenant des éléphants, des lions, des léopards et des crocodiles."
dest_angola_hidden_gem = "Joyau caché"
dest_angola_cta_title = "Prêt à explorer l'Angola ?"
dest_angola_cta_desc = "Laissez-nous créer un itinéraire personnalisé en Angola pour vous. Demandez un devis gratuit et nous vous contacterons dans les 24 heures."

; ── Destination: Zambia ───────────────────────────────────────────────────
dest_zambia_subtitle = "Sauvage, authentique et sans hâte — la Zambie est la grande frontière safari vierge de l'Afrique australe."
dest_zambia_overview = "La Zambie est le secret le mieux gardé de l'Afrique australe — une terre de parcs nationaux sauvages et reculés, de safaris pédestres légendaires et des majestueuses chutes Victoria partagées avec le Zimbabwe. De la pristine vallée de South Luangwa au vaste parc national de Kafue, la Zambie offre une expérience safari intime et peu fréquentée incomparable."
dest_zambia_highlight1 = "Victoria Falls (Mosi-oa-Tunya) — partagées avec le Zimbabwe"
dest_zambia_highlight2 = "Parc national de South Luangwa — l'un des meilleurs d'Afrique pour les safaris pédestres"
dest_zambia_highlight3 = "Parc national du Lower Zambezi — safaris en canoë sur le Zambezi"
dest_zambia_highlight4 = "Parc national de Kafue — l'un des plus grands parcs du monde"
dest_zambia_cta_title = "Explorez la Zambie avec Namwel"
dest_zambia_cta_desc = "La Zambie est fréquemment combinée avec le Zimbabwe et le Botswana pour des itinéraires multi-pays épiques. Demandez un devis et nous créerons le voyage parfait pour vous."

; ── Destinations Index ────────────────────────────────────────────────────
dest_namibia_desc = "Dunes désertiques, ciel immense, faune abondante et côtes spectaculaires. La Namibie est l'une des dernières grandes étendues sauvages du monde — idéale pour les safaris en self-drive et guidés."
dest_namibia_highlight1 = "Sossusvlei & parc national d'Etosha"
dest_namibia_highlight2 = "Skeleton Coast & Damaraland"
dest_botswana_desc = "La plus belle destination safari d'Afrique — reculée, préservée et grouillante de vie sauvage. Le delta de l'Okavango et le parc national de Chobe comptent parmi les plus grandes merveilles naturelles du monde."
dest_botswana_highlight1 = "Delta de l'Okavango & Chobe NP"
dest_botswana_highlight2 = "Parc transfrontalier de Kgalagadi"
dest_zimbabwe_desc = "Victoria Falls, ruines antiques, faune extraordinaire et culture chaleureuse. Le Zimbabwe est une destination en plein essor offrant des expériences de classe mondiale sans la foule."
dest_zimbabwe_highlight1 = "Victoria Falls & Hwange NP"
dest_zimbabwe_highlight2 = "Matobo Hills & Mana Pools"
dest_south_africa_desc = "Un pays aux contrastes extraordinaires — faune emblématique, vignobles de renommée mondiale, côtes spectaculaires et l'énergie cosmopolite du Cap et de Johannesburg."
dest_south_africa_highlight1 = "Kruger NP & Montagne de la Table"
dest_south_africa_highlight2 = "Route des Jardins & Drakensberg"
dest_angola_desc = "Une destination captivante hors des sentiers battus — paysages à couper le souffle, plages atlantiques, chutes spectaculaires et une culture riche à découvrir."
dest_angola_highlight1 = "Chutes de Kalandula & Kissama NP"
dest_angola_highlight2 = "Côte de Luanda, Benguela & Lobito"
