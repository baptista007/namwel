<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 570" preserveAspectRatio="xMidYMid meet" aria-label="Africa map highlighting Namwel operating region">

  <!-- Africa continent base (light gray) -->
  <path fill="#f0f0f0" stroke="white" stroke-width="1.5" stroke-linejoin="round"
    d="M 93,15 L 130,18 L 200,9 L 268,45 L 333,52 L 350,52 L 367,77
       L 397,172 L 421,201 L 476,201 L 436,278 L 397,325 L 395,342
       L 367,372 L 367,438 L 352,497 L 334,529 L 268,558 L 253,548
       L 247,512 L 229,468 L 213,423 L 213,357 L 212,329 L 195,294
       L 196,265 L 158,245 L 133,254 L 101,255 L 62,244 L 45,225
       L 33,204 L 18,175 L 21,130 L 40,68 L 93,15 Z"/>

  <!-- Southern Africa — operating region (Angola, Namibia, Botswana, Zimbabwe, South Africa, Zambia, Mozambique) -->
  <path fill="#a8c939" stroke="white" stroke-width="1.5" stroke-linejoin="round"
    d="M 212,329 L 302,329 L 320,368 L 367,372 L 367,438 L 352,497
       L 334,529 L 268,558 L 253,548 L 247,512 L 229,468 L 213,423
       L 213,357 L 212,329 Z"/>

  <!-- Internal country borders within Southern Africa -->
  <g stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round">
    <!-- Angola / Zambia (lon≈25°, N-S) -->
    <line x1="302" y1="329" x2="302" y2="423"/>
    <!-- Angola / Namibia (Cunene River, E-W) -->
    <line x1="213" y1="423" x2="302" y2="423"/>
    <!-- Namibia / Botswana (N-S) -->
    <line x1="268" y1="423" x2="268" y2="510"/>
    <!-- Zambia / Zimbabwe / Botswana junction (Kazungula area) -->
    <polyline points="302,423 305,429 347,415"/>
    <!-- Botswana / Zimbabwe short border -->
    <polyline points="305,429 311,446 313,463"/>
    <!-- Zimbabwe / Mozambique border -->
    <line x1="347" y1="415" x2="347" y2="463"/>
    <!-- Botswana / South Africa border -->
    <line x1="268" y1="510" x2="313" y2="463"/>
    <!-- Zimbabwe / South Africa (Limpopo River) -->
    <line x1="313" y1="463" x2="347" y2="463"/>
    <!-- Mozambique / South Africa -->
    <line x1="347" y1="463" x2="352" y2="497"/>
    <!-- Zambia / Mozambique (NE) -->
    <line x1="320" y1="368" x2="347" y2="415"/>
  </g>

  <!-- Subtle country borders for rest of Africa -->
  <g stroke="#c8c8c8" stroke-width="0.7" fill="none">
    <!-- Morocco / Algeria -->
    <line x1="93" y1="15" x2="107" y2="72"/>
    <line x1="107" y1="72" x2="130" y2="18"/>
    <!-- Western Sahara / Mauritania -->
    <line x1="40" y1="68" x2="107" y2="72"/>
    <line x1="21" y1="130" x2="40" y2="68"/>
    <!-- Mauritania / Senegal / Mali -->
    <line x1="18" y1="175" x2="35" y2="163"/>
    <line x1="35" y1="163" x2="52" y2="143"/>
    <line x1="52" y1="143" x2="21" y2="130"/>
    <!-- Guinea-Bissau / Guinea area -->
    <line x1="33" y1="204" x2="62" y2="220"/>
    <line x1="62" y1="220" x2="62" y2="244"/>
    <!-- Ivory Coast / Ghana / Togo / Benin -->
    <line x1="62" y1="220" x2="88" y2="245"/>
    <line x1="88" y1="245" x2="101" y2="255"/>
    <line x1="133" y1="254" x2="140" y2="235"/>
    <line x1="140" y1="235" x2="148" y2="247"/>
    <line x1="148" y1="247" x2="158" y2="245"/>
    <!-- Nigeria / Cameroon area -->
    <line x1="158" y1="245" x2="175" y2="213"/>
    <line x1="175" y1="213" x2="196" y2="265"/>
    <!-- Niger / Mali / Burkina area -->
    <line x1="175" y1="213" x2="205" y2="175"/>
    <line x1="205" y1="175" x2="242" y2="162"/>
    <!-- Libya / Algeria / Niger -->
    <line x1="200" y1="9" x2="217" y2="83"/>
    <line x1="217" y1="83" x2="242" y2="162"/>
    <line x1="242" y1="162" x2="263" y2="130"/>
    <line x1="263" y1="130" x2="268" y2="45"/>
    <!-- Chad / Sudan area -->
    <line x1="242" y1="162" x2="295" y2="163"/>
    <line x1="295" y1="163" x2="333" y2="52"/>
    <!-- Sudan / Eritrea / Ethiopia -->
    <line x1="350" y1="52" x2="357" y2="122"/>
    <line x1="357" y1="122" x2="397" y2="172"/>
    <line x1="357" y1="122" x2="320" y2="152"/>
    <line x1="320" y1="152" x2="295" y2="163"/>
    <!-- Ethiopia / Somalia / Kenya -->
    <line x1="397" y1="172" x2="382" y2="217"/>
    <line x1="382" y1="217" x2="436" y2="278"/>
    <line x1="382" y1="217" x2="397" y2="325"/>
    <!-- DRC / Congo / CAR borders -->
    <line x1="212" y1="329" x2="248" y2="294"/>
    <line x1="248" y1="294" x2="284" y2="280"/>
    <line x1="284" y1="280" x2="302" y2="329"/>
    <line x1="284" y1="280" x2="318" y2="264"/>
    <line x1="318" y1="264" x2="320" y2="368"/>
    <line x1="318" y1="264" x2="348" y2="264"/>
    <line x1="348" y1="264" x2="367" y2="372"/>
    <line x1="248" y1="294" x2="290" y2="252"/>
    <line x1="290" y1="252" x2="318" y2="264"/>
    <!-- Cameroon / Gabon / Congo -->
    <line x1="195" y1="294" x2="213" y2="312"/>
    <line x1="213" y1="312" x2="248" y2="294"/>
    <!-- Kenya / Uganda / Tanzania -->
    <line x1="397" y1="325" x2="380" y2="355"/>
    <line x1="380" y1="355" x2="367" y2="372"/>
    <line x1="380" y1="355" x2="372" y2="315"/>
  </g>

  <!-- Madagascar -->
  <path fill="#f0f0f0" stroke="white" stroke-width="1" stroke-linejoin="round"
    d="M 441,388 L 449,352 L 461,378 L 466,414 L 456,452 L 444,470 L 435,452 L 435,418 Z"/>

</svg>
